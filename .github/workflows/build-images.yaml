---
name: build-images

on:
  push:
    branches: ["main"]
    paths:
      - "cluster-talos/kubernetes/apps/tools/netbox/image/**"
      - "cluster-talos/kubernetes/apps/tools/octodns/image/**"
      - "cluster-talos/kubernetes/apps/media/media-toolkit/image/**"
      - ".github/workflows/build-images.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "cluster-talos/kubernetes/apps/tools/netbox/image/**"
      - "cluster-talos/kubernetes/apps/tools/octodns/image/**"
      - "cluster-talos/kubernetes/apps/media/media-toolkit/image/**"
      - ".github/workflows/build-images.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: netbox-plus
            context: cluster-talos/kubernetes/apps/tools/netbox/image
          - name: octodns
            context: cluster-talos/kubernetes/apps/tools/octodns/image
          - name: media-toolkit
            context: cluster-talos/kubernetes/apps/media/media-toolkit/image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
