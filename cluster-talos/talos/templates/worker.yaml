version: v1alpha1
debug: false
persist: true
machine:
  type: worker
  # Class: standard worker (no GPU, no Longhorn disk, no register-with-taints).
  # Longhorn CSI plugins on these nodes mount volumes only; no /var/mnt/longhorn
  # UserVolume and no rshared extraMounts (that's the GPU-worker class).
  {{- if .Values.node.labels }}
  nodeLabels:
    {{- range $k, $v := .Values.node.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
  {{- if .Values.node.taints }}
  nodeTaints:
    {{- range $k, $v := .Values.node.taints }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"
      cloud-provider: external
      {{- if .Values.node.registerWithTaints }}
      register-with-taints: {{ .Values.node.registerWithTaints | quote }}
      {{- end }}
    extraConfig:
      shutdownGracePeriod: 60s
      shutdownGracePeriodCriticalPods: 20s
    nodeIP:
      validSubnets:
        {{- range .Values.machine.kubelet.nodeIPSubnets }}
        - {{ . }}
        {{- end }}
  network:
    nameservers:
      {{- range .Values.machine.nameservers }}
      - {{ . }}
      {{- end }}
    interfaces:
      {{- if .Values.node.ip }}
      - deviceSelector:
          busPath: "0000:0b:00.0"
        addresses:
          - {{ .Values.node.ip }}
        routes:
          - network: 0.0.0.0/0
            gateway: {{ .Values.node.gateway | quote }}
      {{- if .Values.node.storageIP }}
      - deviceSelector:
          busPath: "0000:13:00.0"
        addresses:
          - {{ .Values.node.storageIP }}
      {{- end }}
      {{- else }}
{{ include "talm.discovered.existing_interfaces_configuration" . | indent 6 }}
      {{- end }}
  install:
    disk: {{ .Values.installer.disk }}
    image: {{ include "k8s-talos.installImage" . }}
    wipe: false
  time:
    servers:
      {{- range .Values.machine.timeServers }}
      - {{ . }}
      {{- end }}
  features:
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false
cluster:
  controlPlane:
    endpoint: {{ .Values.cluster.endpoint }}
  clusterName: {{ .Values.cluster.name }}
  network:
    {{- include "k8s-talos.emptyClusterSubnets" . | nindent 4 }}
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: {{ if .Values.hostname }}{{ .Values.hostname }}{{ else }}{{ include "talm.discovered.hostname" . }}{{ end }}
---
# vmxnet3 RX ring max'd to prevent drops at high NNTP stream counts (150+).
# Ship a doc per plausible NIC name; Talos only applies to interfaces present.
apiVersion: v1alpha1
kind: EthernetConfig
name: ens192
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
---
apiVersion: v1alpha1
kind: EthernetConfig
name: ens224
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
---
apiVersion: v1alpha1
kind: EthernetConfig
name: eth0
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
---
apiVersion: v1alpha1
kind: EthernetConfig
name: eth1
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
