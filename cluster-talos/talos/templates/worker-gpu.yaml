version: v1alpha1
debug: false
persist: true
machine:
  type: worker
  # Class: GPU worker. Intel Arc labels/taints/install image baked in
  # unconditionally — no .Values gating. Per-node values (ip/hostname) still
  # apply for offline bootstrap render; day-2 apply uses live discovery.
  nodeLabels:
    gpu: intel-arc
  # NodeApplyController reconciles this. Must match kubelet register-with-taints
  # exactly, otherwise the controller issues a PATCH which NodeRestriction
  # forbids kubelets from doing (self-taint modification blocked).
  # PreferNoSchedule (not NoSchedule) keeps the door open for non-tolerating
  # workloads to land here when nothing else fits.
  nodeTaints:
    intel.feature.node.kubernetes.io/gpu: "true:PreferNoSchedule"
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"
      cloud-provider: external
      register-with-taints: "intel.feature.node.kubernetes.io/gpu=true:PreferNoSchedule"
    extraConfig:
      shutdownGracePeriod: 60s
      shutdownGracePeriodCriticalPods: 20s
    nodeIP:
      validSubnets:
        {{- range .Values.machine.kubelet.nodeIPSubnets }}
        - {{ . }}
        {{- end }}
  network:
    nameservers:
      {{- range .Values.machine.nameservers }}
      - {{ . }}
      {{- end }}
    interfaces:
      {{- if .Values.node.ip }}
      - deviceSelector:
          busPath: "0000:0b:00.0"
        addresses:
          - {{ .Values.node.ip }}
        routes:
          - network: 0.0.0.0/0
            gateway: {{ .Values.node.gateway | quote }}
      {{- if .Values.node.storageIP }}
      - deviceSelector:
          busPath: "0000:13:00.0"
        addresses:
          - {{ .Values.node.storageIP }}
      {{- end }}
      {{- else }}
{{ include "talm.discovered.existing_interfaces_configuration" . | indent 6 }}
      {{- end }}
  install:
    disk: {{ .Values.installer.disk }}
    image: {{ include "k8s-talos.gpuInstallImage" . }}
    wipe: false
  time:
    servers:
      {{- range .Values.machine.timeServers }}
      - {{ . }}
      {{- end }}
  features:
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false
  kernel:
    modules:
      - name: iscsi_tcp
cluster:
  controlPlane:
    endpoint: {{ .Values.cluster.endpoint }}
  clusterName: {{ .Values.cluster.name }}
  network:
    {{- include "k8s-talos.emptyClusterSubnets" . | nindent 4 }}
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: {{ if .Values.hostname }}{{ .Values.hostname }}{{ else }}{{ include "talm.discovered.hostname" . }}{{ end }}
---
# vmxnet3 RX ring max'd to prevent drops at high NNTP stream counts (150+).
# Ship a doc per plausible NIC name; Talos only applies to interfaces present.
apiVersion: v1alpha1
kind: EthernetConfig
name: ens192
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
---
apiVersion: v1alpha1
kind: EthernetConfig
name: ens224
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
---
apiVersion: v1alpha1
kind: EthernetConfig
name: eth0
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
---
apiVersion: v1alpha1
kind: EthernetConfig
name: eth1
rings:
  rx: 4096
  rx-mini: 2048
  rx-jumbo: 4096
  tx: 4096
