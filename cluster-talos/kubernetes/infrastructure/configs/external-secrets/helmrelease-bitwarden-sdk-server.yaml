apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bitwarden-sdk-server
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: bitwarden-sdk-server
      version: "v0.6.0"
      sourceRef:
        kind: HelmRepository
        name: bitwarden-sdk-server
        namespace: flux-system
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
