# Prerequisites: create the bitwarden-credentials Secret manually before applying:
#
#   kubectl create secret generic bitwarden-credentials \
#     --namespace external-secrets \
#     --from-literal=token=<machine-account-token>
#
# The machine account token is generated in Bitwarden Secrets Manager.
# organizationID is embedded directly (not secret) — it's a non-sensitive UUID.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-secretsmanager
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.eu
      identityURL: https://identity.bitwarden.eu
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      caProvider:
        type: Secret
        name: bitwarden-tls-certs
        key: ca.crt
        namespace: external-secrets
      organizationID: "18a81261-97c6-4095-a637-b42900baaefd"
      projectID: "e6e860bb-7dc4-4ee0-9229-b42900bcfae2"
      auth:
        secretRef:
          credentials:
            name: bitwarden-credentials
            namespace: external-secrets
            key: token
