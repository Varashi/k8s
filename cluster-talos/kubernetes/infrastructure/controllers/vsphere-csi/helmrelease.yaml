apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vsphere-csi
  namespace: vmware-system-csi
spec:
  interval: 30m
  chart:
    spec:
      chart: vsphere-csi
      version: "3.8.1"
      sourceRef:
        kind: HelmRepository
        name: vsphere-tmm
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
  values:
    global:
      config:
        existingSecret: vsphere-config-secret
        storageclass:
          enabled: false
    vsphere-cpi:
      enabled: false
    snapshot:
      controller:
        enabled: false
      validationWebhook:
        enabled: false
