---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-instance
  namespace: flux-system
spec:
  chartRef:
    kind: OCIRepository
    name: flux-instance
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    instance:
      distribution:
        artifact: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:v0.47.0
      cluster:
        networkPolicy: false
      components:
        - source-controller
        - kustomize-controller
        - helm-controller
        - notification-controller
      sync:
        kind: GitRepository
        url: https://github.com/Varashi/k8s.git
        ref: refs/heads/main
        path: cluster-talos/kubernetes/flux/cluster
        interval: 1h
        pullSecret: flux-system
      kustomize:
        patches:
          - target:
              kind: Deployment
              name: (kustomize-controller|helm-controller|source-controller)
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --concurrent=10
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --requeue-dependency=5s
          - target:
              kind: Deployment
              name: (kustomize-controller|helm-controller|source-controller)
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: all
              spec:
                template:
                  spec:
                    containers:
                      - name: manager
                        resources:
                          limits:
                            memory: 2Gi
          - target:
              kind: Deployment
              name: kustomize-controller
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --concurrent=20
              - op: replace
                path: /spec/template/spec/volumes/0
                value:
                  name: temp
                  emptyDir:
                    medium: Memory
          - target:
              kind: Deployment
              name: source-controller
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --helm-cache-max-size=10
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --helm-cache-ttl=60m
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --helm-cache-purge-interval=5m
          - target:
              kind: Deployment
              name: source-controller
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --feature-gates=CacheSecretsAndConfigMaps=true
          - target:
              kind: Deployment
              name: helm-controller
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --feature-gates=OOMWatch=true
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --oom-watch-memory-threshold=95
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --oom-watch-interval=500ms
          - target:
              kind: Deployment
              name: helm-controller
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --feature-gates=DefaultToRetryOnFailure=true,DisableChartDigestTracking=true
          - target:
              kind: Deployment
              name: (kustomize-controller|helm-controller)
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --watch-configs-label-selector=owner!=helm
          - target:
              kind: Deployment
              name: (source-controller|kustomize-controller|helm-controller|notification-controller)
            patch: |-
              - op: add
                path: /spec/template/spec/tolerations
                value:
                  - key: node.cloudprovider.kubernetes.io/uninitialized
                    operator: Exists
                    effect: NoSchedule
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: Equal
                    value: "true"
                    effect: NoSchedule
