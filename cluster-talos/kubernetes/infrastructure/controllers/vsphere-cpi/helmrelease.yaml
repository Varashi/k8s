apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vsphere-cpi
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: vsphere-cpi
      version: "1.35.1"
      sourceRef:
        kind: HelmRepository
        name: vsphere-cpi
        namespace: flux-system
  values:
    config:
      enabled: true
      vcenter: skw-vcsa.${SECRET_DOMAIN}
      datacenter: SKW
      region: ""
      zone: ""
      secret:
        create: false
        name: vsphere-cloud-secret
    daemonset:
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          effect: NoSchedule
