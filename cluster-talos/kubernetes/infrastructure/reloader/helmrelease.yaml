apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 30m
  chart:
    spec:
      chart: reloader
      version: 2.2.11
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    fullnameOverride: reloader
    reloader:
      watchGlobally: true
      readOnlyRootFileSystem: true
      reloadOnCreate: true
      syncAfterRestart: true
      deployment:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        tolerations:
          - key: node.cloudprovider.kubernetes.io/uninitialized
            operator: Exists
            effect: NoSchedule
          - key: intel.feature.node.kubernetes.io/gpu
            operator: Equal
            value: "true"
            effect: NoSchedule
