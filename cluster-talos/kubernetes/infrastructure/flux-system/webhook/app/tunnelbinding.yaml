---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: flux-webhook
  namespace: flux-system
subjects:
  - name: webhook-receiver
    spec:
      fqdn: flux-webhook.${SECRET_DOMAIN}
      target: http://webhook-receiver.flux-system.svc.cluster.local:80
      protocol: http
tunnelRef:
  kind: ClusterTunnel
  name: k8s-talos
