---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    serviceMonitor:
      create: false
    networkPolicy:
      create: false
    # Chart default has limits.cpu: 2; null strips it after deep-merge.
    # KRR (96h Prom): operator idle, brief reconcile bursts shouldn't throttle.
    resources:
      requests:
        cpu: 25m
        memory: 192Mi
      limits:
        cpu: ~
        memory: 1Gi
