apiVersion: config.kio.kasten.io/v1alpha1
kind: Policy
metadata:
  name: k8s-backup
  namespace: kasten-io
spec:
  presetRef:
    name: k8s-backup
    namespace: kasten-io
  selector:
    matchExpressions:
      - key: k10.kasten.io/backup
        operator: In
        values:
          - "true"
      - key: storage-class
        operator: NotIn
        values:
          - longhorn
  actions:
    - action: backup
      backupParameters:
        filters:
          excludeResources:
            - name: sabnzbd-download
    - action: export
