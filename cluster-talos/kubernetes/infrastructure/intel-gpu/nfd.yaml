apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: node-feature-discovery
spec:
  interval: 30m
  chart:
    spec:
      chart: node-feature-discovery
      version: 0.18.3
      sourceRef:
        kind: HelmRepository
        name: node-feature-discovery
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # NodeFeatureRule CR drives labels — disable noisy built-in feature labels we don't use
    master:
      replicaCount: 1
      config:
        noPublish: false
        # only emit labels matched by NodeFeatureRule, not raw feature.node.kubernetes.io/* dump
        denyLabelNs:
          - "feature.node.kubernetes.io"
    worker:
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      config:
        core:
          sleepInterval: 60s
        sources:
          pci:
            deviceClassWhitelist:
              - "0300"
              - "0380"
            deviceLabelFields:
              - vendor
              - device
              - class
    # GC reaps stale NodeFeature objects when nodes vanish
    gc:
      enable: true
