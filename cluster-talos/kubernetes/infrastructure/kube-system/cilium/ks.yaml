---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: gateway-api
  path: ./cluster-talos/kubernetes/infrastructure/kube-system/cilium/app
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
