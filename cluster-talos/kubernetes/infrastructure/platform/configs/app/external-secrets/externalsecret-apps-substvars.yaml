# Creates a Secret in flux-system so the apps Kustomization can use
# substituteFrom to inject ${SECRET_NFS_HOST} into app manifests.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apps-substvars
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: apps-substvars
    creationPolicy: Owner
  data:
    - secretKey: SECRET_NFS_HOST
      remoteRef:
        key: SECRET_NFS_HOST
