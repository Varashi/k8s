# Creates a Secret in flux-system so the kasten-io Kustomization can
# use substituteFrom to inject LDAP + admin user variables into manifests.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kasten-substvars
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: kasten-substvars
    creationPolicy: Owner
  data:
    - secretKey: SECRET_LDAP_BASE_DN
      remoteRef:
        key: SECRET_LDAP_BASE_DN
    - secretKey: SECRET_LDAP_BIND_DN
      remoteRef:
        key: SECRET_LDAP_BIND_DN
    - secretKey: SECRET_KASTEN_ADMIN_USER
      remoteRef:
        key: SECRET_KASTEN_ADMIN_USER
    - secretKey: SECRET_AD_CA_PEM_B64
      remoteRef:
        key: SECRET_AD_CA_PEM_B64
    - secretKey: SECRET_KASTEN_MIGRATION_TOKEN
      remoteRef:
        key: SECRET_KASTEN_MIGRATION_TOKEN
