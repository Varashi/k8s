# Creates a Secret in flux-system so the cloudflare-tunnel Kustomization can
# use substituteFrom to inject ${SECRET_CLOUDFLARE_ACCOUNT_ID} into manifests.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-substvars
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: cloudflare-substvars
    creationPolicy: Owner
  data:
    - secretKey: SECRET_CLOUDFLARE_ACCOUNT_ID
      remoteRef:
        key: SECRET_CLOUDFLARE_ACCOUNT_ID
    - secretKey: SECRET_CLOUDFLARE_ACCOUNT_EMAIL
      remoteRef:
        key: SECRET_CLOUDFLARE_ACCOUNT_EMAIL
