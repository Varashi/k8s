# Creates a Secret in flux-system so the external-dns Kustomization can
# use substituteFrom to inject Kerberos realm + KDC vars into configmap-krb5.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: externaldns-substvars
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: externaldns-substvars
    creationPolicy: Owner
  data:
    - secretKey: SECRET_EXTERNAL_DNS_KERBEROS_REALM
      remoteRef:
        key: SECRET_EXTERNAL_DNS_KERBEROS_REALM
    - secretKey: SECRET_EXTERNAL_DNS_KDC_1
      remoteRef:
        key: SECRET_EXTERNAL_DNS_KDC_1
    - secretKey: SECRET_EXTERNAL_DNS_KDC_2
      remoteRef:
        key: SECRET_EXTERNAL_DNS_KDC_2
