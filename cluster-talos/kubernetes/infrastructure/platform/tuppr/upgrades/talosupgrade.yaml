---
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: talos
  namespace: system-upgrade
spec:
  # gpu-worker-1 temporarily excluded — auto-revert loop on Talos 1.13 boot,
  # likely due to longhorn/cilium DS slow-start blocking boot watchdog.
  # Try regular workers first to isolate root cause.
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: NotIn
        values:
          - k8s-talos-gpu-worker-1
  talos:
    # Per-node schematic hash comes from node annotation
    # `tuppr.home-operations.com/schematic` — CP/worker nodes get the CPU-only
    # schematic (vmtoolsd-guest-agent), GPU workers get the i915/iscsi-tools
    # schematic. Annotations applied out-of-band.
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.13.0
  policy:
    rebootMode: default
