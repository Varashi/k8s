apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-token
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: renovate-token
    creationPolicy: Owner
  data:
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: SECRET_RENOVATE_TOKEN
