---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: configs
  path: ./cluster-talos/kubernetes/infrastructure/platform/longhorn-system/app
  # prune=false: Longhorn holds stateful replica data — accidental prune
  # (path typo, kustomize build error) MUST NOT cascade-delete the CRs,
  # as that triggers orphan controller and wipes replicas on disk.
  # Removing a Longhorn manifest from git = remove it via kubectl manually.
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
  wait: true
  timeout: 15m
