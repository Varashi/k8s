apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-wffc
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    k10.kasten.io/volume-snapshot-class: longhorn-snapshot
    # Required for K10 block-mode export; without it the export fails with
    # "volume's storage class does not support block mode export".
    k10.kasten.io/sc-supports-block-mode-exports: "true"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: ext4
  dataLocality: best-effort
  unmapMarkSnapChainRemoved: ignored
  disableRevisionCounter: "true"
  dataEngine: v1
  backupTargetName: default
