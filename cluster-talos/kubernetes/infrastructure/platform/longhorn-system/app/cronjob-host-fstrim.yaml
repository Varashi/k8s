---
# Periodic host-side fstrim. Split into two CronJobs:
#   - host-fstrim-var: all nodes, trims /var (Talos EPHEMERAL).
#   - host-fstrim-longhorn: longhorn=enabled nodes only, trims the
#     Longhorn data UserVolume at /var/mnt/longhorn.
# Without this, thin VMDKs accumulate stale allocations on vSAN ESA
# even when guest fs usage is low. Talos VolumeConfig schema does not
# expose mount options, so periodic FITRIM is the way to release
# deleted blocks back to vSAN.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: host-fstrim-var
  namespace: longhorn-system
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      parallelism: 8
      completions: 8
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: host-fstrim-var
        spec:
          restartPolicy: Never
          tolerations:
            - operator: Exists
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: host-fstrim-var
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: fstrim
              image: alpine:3.23
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -ec
                - |
                  apk add --no-cache util-linux >/dev/null
                  echo "=== node $(hostname) ==="
                  fstrim -v /host/var || true
              volumeMounts:
                - name: host-var
                  mountPath: /host/var
                  mountPropagation: HostToContainer
          volumes:
            - name: host-var
              hostPath:
                path: /var
                type: Directory
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: host-fstrim-longhorn
  namespace: longhorn-system
spec:
  schedule: "45 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      parallelism: 3
      completions: 3
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: host-fstrim-longhorn
        spec:
          restartPolicy: Never
          nodeSelector:
            longhorn: enabled
          tolerations:
            - operator: Exists
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: host-fstrim-longhorn
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: fstrim
              image: alpine:3.23
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -ec
                - |
                  apk add --no-cache util-linux >/dev/null
                  echo "=== node $(hostname) ==="
                  fstrim -v /host/longhorn || true
              volumeMounts:
                - name: host-longhorn
                  mountPath: /host/longhorn
                  mountPropagation: HostToContainer
          volumes:
            - name: host-longhorn
              hostPath:
                path: /var/mnt/longhorn
                type: Directory
