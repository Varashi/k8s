---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: cnpg
    - name: external-secrets
  path: ./cluster-talos/kubernetes/infrastructure/platform/authentik/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 15m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
      - kind: Secret
        name: apps-substvars
