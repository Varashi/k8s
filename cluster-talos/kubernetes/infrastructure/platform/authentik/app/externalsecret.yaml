---
# CNPG initdb bootstrap creds (basic-auth).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-db-credentials
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: authentik-db-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: authentik
        password: "{{ .dbPassword }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_AUTHENTIK_POSTGRES_PASSWORD
---
# Extra AUTHENTIK_* env loaded via global.envFrom on server+worker.
# Overrides empty keys from chart-generated secret (keys left empty in values.yaml are skipped).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-extra-env
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: authentik-extra-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AUTHENTIK_SECRET_KEY: "{{ .secretKey }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .dbPassword }}"
        AUTHENTIK_BOOTSTRAP_PASSWORD: "{{ .bootstrapPassword }}"
        AUTHENTIK_BOOTSTRAP_TOKEN: "{{ .bootstrapToken }}"
        AUTHENTIK_BOOTSTRAP_EMAIL: frank@boeye.net
  data:
    - secretKey: secretKey
      remoteRef:
        key: SECRET_AUTHENTIK_SECRET_KEY
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_AUTHENTIK_POSTGRES_PASSWORD
    - secretKey: bootstrapPassword
      remoteRef:
        key: SECRET_AUTHENTIK_BOOTSTRAP_PASSWORD
    - secretKey: bootstrapToken
      remoteRef:
        key: SECRET_AUTHENTIK_BOOTSTRAP_TOKEN
