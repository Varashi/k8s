---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik-redis
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist

    controllers:
      redis:
        containers:
          app:
            image:
              repository: redis
              tag: 8-alpine
            args:
              - redis-server
              - --appendonly
              - "yes"
              - --maxmemory
              - "512mb"
              - --maxmemory-policy
              - "allkeys-lru"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 768Mi
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    service:
      app:
        controller: redis
        ports:
          redis:
            port: 6379

    persistence:
      data:
        existingClaim: authentik-redis-data
        globalMounts:
          - path: /data
