---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kasten-io
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: external-secrets
    - name: monitoring
    - name: configs
  path: ./cluster-talos/kubernetes/infrastructure/platform/kasten-io/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
      - kind: Secret
        name: kasten-substvars
  wait: true
  timeout: 5m
