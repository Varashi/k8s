apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kasten
  namespace: kasten-io
  annotations:
    gatus.home-operations.com/endpoint: |
      conditions: ["[STATUS] < 500"]
      interval: 60s
      group: tools
spec:
  parentRefs:
    - name: main
      namespace: cilium
      sectionName: https
  hostnames:
    - kasten.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /k10/
            statusCode: 301
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gateway
          port: 80
