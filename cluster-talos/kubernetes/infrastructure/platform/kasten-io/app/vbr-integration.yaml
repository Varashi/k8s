---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kasten-sa
  namespace: kasten-io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kasten-sa-k10-admin
subjects:
  - kind: ServiceAccount
    name: kasten-sa
    namespace: kasten-io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k10-admin
---
apiVersion: v1
kind: Secret
metadata:
  name: kasten-sa-token
  namespace: kasten-io
  annotations:
    kubernetes.io/service-account.name: kasten-sa
type: kubernetes.io/service-account-token
