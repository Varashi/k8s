---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus
      version: 29.x
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  values:
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false

    server:
      retention: 7d
      global:
        scrape_interval: 60s
        evaluation_interval: 60s
      persistentVolume:
        enabled: true
        size: 20Gi
        storageClass: vsan
      resources:
        requests:
          cpu: 50m
          memory: 4Gi
        limits:
          memory: 4Gi
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      route:
        main:
          enabled: true
          annotations:
            gatus.home-operations.com/endpoint: |
              conditions: ["[STATUS] < 500"]
              interval: 60s
              group: tools
          parentRefs:
            - name: main
              namespace: cilium
              sectionName: https
          hostnames:
            - prom.${SECRET_DOMAIN}
    extraScrapeConfigs: |
      - job_name: intel-gpu-exporter-fast
        honor_labels: true
        scrape_interval: 5s
        scrape_timeout: 3s
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: intel-gpu-exporter
          - action: keep
            source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8080"
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: drop
            regex: Pending|Succeeded|Failed|Completed
            source_labels: [__meta_kubernetes_pod_phase]
    kube-state-metrics:
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 512Mi
      livenessProbe:
        timeoutSeconds: 10
      readinessProbe:
        timeoutSeconds: 10
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
        - key: intel.feature.node.kubernetes.io/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

    prometheus-node-exporter:
      extraArgs:
        - --collector.mountstats
      resources:
        requests:
          cpu: 10m
          memory: 24Mi
        limits:
          memory: 64Mi
      tolerations:
        - operator: Exists
