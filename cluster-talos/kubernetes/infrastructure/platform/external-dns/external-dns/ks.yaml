---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: configs
  path: ./cluster-talos/kubernetes/infrastructure/platform/external-dns/external-dns/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
      - kind: Secret
        name: externaldns-substvars
  wait: true
  timeout: 5m
