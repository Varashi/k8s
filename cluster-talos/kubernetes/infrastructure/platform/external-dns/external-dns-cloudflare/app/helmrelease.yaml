apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
  values:
    provider:
      name: cloudflare

    # Reads DNSEndpoint CRs (legacy) and HTTPRoutes carrying
    # external-dns.alpha.kubernetes.io/public=true.
    # rfc2136 instance (AD) ignores the same annotation via !=true filter.
    sources:
      - crd
      - gateway-httproute
      - service

    # DNSEndpoint CRD already installed by this chart (only consumer).
    crd:
      create: true

    # Only act on resources explicitly marked public.
    extraArgs:
      - --annotation-filter=external-dns.alpha.kubernetes.io/public=true
      # Distinct TXT prefix avoids collision with rfc2136 TXT registry.
      - --txt-prefix=cf-

    txtOwnerId: "ext-dns-talos-cf"
    policy: sync

    domainFilters:
      - ${SECRET_DOMAIN}

    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: CF_API_TOKEN

    service:
      enabled: false

    tolerations:
      - key: node.cloudprovider.kubernetes.io/uninitialized
        operator: Exists
        effect: NoSchedule
      - key: intel.feature.node.kubernetes.io/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
