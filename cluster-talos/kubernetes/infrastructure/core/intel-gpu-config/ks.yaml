---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-gpu-config
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: intel-gpu
  path: ./cluster-talos/kubernetes/infrastructure/core/intel-gpu-config/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
