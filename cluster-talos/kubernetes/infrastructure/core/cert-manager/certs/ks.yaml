---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certs
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: cert-manager
    - name: external-secrets
  path: ./cluster-talos/kubernetes/infrastructure/core/cert-manager/certs/app
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
