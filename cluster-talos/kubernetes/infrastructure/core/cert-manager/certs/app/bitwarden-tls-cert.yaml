# TLS certificate for the bitwarden-sdk-server — issued by the internal cluster CA.
# cert-manager writes this to the bitwarden-tls-certs Secret which the SDK server mounts.
# The CA cert (ca.crt) is referenced by the ClusterSecretStore for server verification.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-sdk-server
  namespace: external-secrets
spec:
  secretName: bitwarden-tls-certs
  duration: 2160h   # 90 days
  renewBefore: 360h # 15 days
  commonName: bitwarden-sdk-server.external-secrets.svc.cluster.local
  dnsNames:
    - bitwarden-sdk-server
    - bitwarden-sdk-server.external-secrets
    - bitwarden-sdk-server.external-secrets.svc
    - bitwarden-sdk-server.external-secrets.svc.cluster.local
  issuerRef:
    name: cluster-ca
    kind: ClusterIssuer
