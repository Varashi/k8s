apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
  namespace: kubelet-csr-approver
spec:
  interval: 1h
  chart:
    spec:
      chart: kubelet-csr-approver
      version: "1.2.x"
      sourceRef:
        kind: HelmRepository
        name: kubelet-csr-approver
        namespace: flux-system
  values:
    replicas: 2
    # Match all node names in this cluster
    providerRegex: "^k8s-talos-.*"
    # Talos node IPs are static; skip reverse DNS validation
    bypassDnsResolution: true
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        effect: NoSchedule
      - key: node.cloudprovider.kubernetes.io/uninitialized
        operator: Exists
        effect: NoSchedule
      - key: intel.feature.node.kubernetes.io/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 128Mi
