---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-node-vsphere-maintenance-controller
  namespace: gpu-node-vsphere-maintenance
spec:
  interval: 1h
  chart:
    spec:
      chart: gpu-node-vsphere-maintenance-controller
      version: 0.4.3
      sourceRef:
        kind: HelmRepository
        name: gpu-node-vsphere-maintenance-controller
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    vcenter:
      existingSecret: vsphere-credentials
      caBundle:
        configMapName: boeye-ca-bundle
