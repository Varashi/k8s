apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: ombi
  namespace: ombi
subjects:
  - name: ombi
    spec:
      fqdn: plexrequests.${SECRET_DOMAIN}
      target: http://ombi.ombi.svc.cluster.local:3579
      protocol: http
tunnelRef:
  kind: ClusterTunnel
  name: k8s-talos
