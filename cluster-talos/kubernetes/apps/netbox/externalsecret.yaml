---
# Bootstrap secret referenced by CNPG initdb (must contain username + password)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-db-app
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: netbox-db-app
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: netbox
        password: "{{ .dbPassword }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_NETBOX_DB_PASSWORD
---
# NetBox chart existingSecret — keys consumed per chart values.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: netbox
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # chart reads these as mounted files via Django _read_secret()
        secret_key: "{{ .djangoKey }}"
        password: "{{ .superuserPassword }}"
        api_token: "{{ .superuserApiToken }}"
        email_password: "unused"
        redis_tasks_password: ""
        redis_cache_password: ""
  data:
    - secretKey: djangoKey
      remoteRef:
        key: SECRET_NETBOX_DJANGO_KEY
    - secretKey: superuserPassword
      remoteRef:
        key: SECRET_NETBOX_SUPERUSER_PASSWORD
    - secretKey: superuserApiToken
      remoteRef:
        key: SECRET_NETBOX_SUPERUSER_API_TOKEN
