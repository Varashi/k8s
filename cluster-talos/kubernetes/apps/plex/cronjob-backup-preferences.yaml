apiVersion: batch/v1
kind: CronJob
metadata:
  name: plex-backup-preferences
  namespace: plex
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: plex
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: busybox:latest
              command:
                - /bin/sh
                - -c
                - |
                  DATE=$$(date +%Y-%m-%d)

                  # Back up Preferences.xml
                  cp "/config/Library/Application Support/Plex Media Server/Preferences.xml" \
                     "/backup/Preferences.xml-$${DATE}"
                  echo "Backed up Preferences.xml as Preferences.xml-$${DATE}"
                  ls -t /backup/Preferences.xml-* | tail -n +8 | xargs -r rm -v

                  # Back up agent preferences (Plug-in Support/Preferences/)
                  tar -czf "/backup/PluginPreferences-$${DATE}.tar.gz" \
                    -C "/config/Library/Application Support/Plex Media Server/Plug-in Support" \
                    Preferences
                  echo "Backed up Plug-in Support/Preferences as PluginPreferences-$${DATE}.tar.gz"
                  ls -t /backup/PluginPreferences-*.tar.gz | tail -n +8 | xargs -r rm -v
              volumeMounts:
                - name: config-pms
                  mountPath: /config
                - name: backup
                  mountPath: /backup
          volumes:
            - name: config-pms
              persistentVolumeClaim:
                claimName: plex-config-pms
            - name: backup
              nfs:
                server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
                path: /mnt/DATA/backup/plex
