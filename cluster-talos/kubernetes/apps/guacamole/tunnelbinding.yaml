apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: guacamole
  namespace: guacamole
subjects:
  - name: guacamole-app
    spec:
      fqdn: guac.${SECRET_DOMAIN}
      target: http://guacamole-app.guacamole.svc.cluster.local:8080
      protocol: http
tunnelRef:
  kind: ClusterTunnel
  name: k8s-talos
