---
# plex-test namespace, scaleplex internals.
#
# Phase 7 (2026-05-06): retired pabloromeo/plex-test's bundled
# orchestrator + lsio-based workers + LOCAL_RELAY nginx in favour of
# Varashi/scaleplex (stock jellyfin-ffmpeg7 + iHD VAAPI workers + thin
# Go orchestrator + s6-rc relay sidecar via DOCKER_MOD). Helm release
# stays named "plex-test" so the public hostname, LoadBalancer IP,
# NetBox tag, and PVC names don't churn.
#
# What scaleplex changes vs. the old plex-test chart:
#  - worker image swapped to scaleplex_worker (Ubuntu 24.04 +
#    jellyfin-ffmpeg7, iHD baked in)
#  - orchestrator image swapped to scaleplex_orchestrator (Go, no
#    socket.io, DNS-discovers workers, picks least-loaded)
#  - PMS DOCKER_MODS swapped to scaleplex_pms_dockermod (drops in
#    scaleplex-shim as Plex Transcoder + scaleplex-relay as s6-rc
#    longrun on PMS pod)
#  - Init containers for iHD driver fetch dropped (scaleplex bakes
#    iHD into the worker image)
#  - /codecs and /drivers NFS caches dropped (scaleplex doesn't
#    download Plex codecs; jellyfin-ffmpeg7 ships them all)
#  - PMS postStart hook for worker-restart dropped (no EAE state;
#    workers don't pin to a PMS UUID)
#  - rbac.yaml deleted (postStart hook gone)
#
# See ~/git/scaleplex/docs/ARCHITECTURE.md and SEEK.md for the full
# story on what each component does and why the old setup got retired.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-test
  namespace: plex-test
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    disableWait: true
    remediation:
      retries: 3
  values:
    controllers:
      orchestrator:
        containers:
          app:
            # scaleplex orchestrator. Slim Go HTTP server: DNS-discovers
            # workers via the headless `plex-test-worker` Service,
            # forwards POSTs from PMS-side shim verbatim, picks
            # least-loaded.
            image:
              repository: ghcr.io/varashi/scaleplex_orchestrator
              tag: sha-5daef39
            env:
              TZ: Europe/Brussels
              LISTEN_ADDR: ":3500"
              WORKERS_DNS: plex-test-worker.plex-test.svc.cluster.local
              WORKER_PORT: "3501"
              WORKERS_REFRESH_SECONDS: "5"
              WORKERS_PROBE_SECONDS: "5"
            probes:
              liveness: { enabled: true, custom: true, spec: { httpGet: { path: /healthz, port: 3500 }, periodSeconds: 10 } }
              readiness: { enabled: true, custom: true, spec: { httpGet: { path: /readyz, port: 3500 }, periodSeconds: 2, failureThreshold: 30 } }
            resources:
              requests: { cpu: 50m, memory: 64Mi }
              limits: { memory: 128Mi }
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          # No GPU on orchestrator; runs on any node.
          tolerations: []
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "3500"
            prometheus.io/path: /metrics

      pms:
        serviceAccount:
          identifier: pms
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            env:
              TZ: Europe/Brussels
              VERSION: docker
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              # scaleplex DOCKER_MOD — lays down scaleplex-shim as
              # /usr/lib/plexmediaserver/Plex Transcoder + runs
              # scaleplex-relay as an s6-rc.d longrun. Replaces
              # plex-test_dockermod (which set up nginx LOCAL_RELAY
              # + transcoder.js worker dispatcher).
              DOCKER_MODS: ghcr.io/varashi/scaleplex_pms_dockermod:sha-08b3ebb
              # Both LOCAL_RELAY_* are read by scaleplex-relay (and by
              # the shim's collectEnv() to derive SCALEPLEX_PMS_BASE_URL
              # for the rewriter's URL substitutions).
              LOCAL_RELAY_ENABLED: "1"
              LOCAL_RELAY_PORT: "32499"
              PMS_SERVICE: plex-test-pms.plex-test.svc
              PMS_PORT: "32400"
              # scaleplex-shim reads SCALEPLEX_ORCHESTRATOR_URL and
              # POSTs the task envelope there. Keep ORCHESTRATOR_URL
              # set as well — plex-test_dockermod still inspects it
              # at extract time, harmless to leave.
              SCALEPLEX_ORCHESTRATOR_URL: http://plex-test-orchestrator.plex-test.svc:3500
              ORCHESTRATOR_URL: http://plex-test-orchestrator.plex-test.svc:3500
              TRANSCODE_OPERATING_MODE: remote
              # Dump full PMS argv to PMS log for durable argv-corpus
              # capture. PMS log lives on PMS's persistent vSphere
              # volume (weeks of retention) vs worker pod logs which
              # are ephemeral and ~3-4h max in practice. Pairs with
              # WORKER_DUMP_ARGV on the worker DS for the live JSON
              # corpus written to /transcode/_argv-corpus.
              SCALEPLEX_DUMP_ARGV: "1"
            resources:
              requests:
                memory: 4Gi
              limits:
                gpu.intel.com/i915: 1
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          securityContext:
            supplementalGroups: [568]

      worker:
        type: daemonset
        containers:
          app:
            # scaleplex worker. Stock jellyfin-ffmpeg7 + iHD baked into
            # the image. Pre-warms VAAPI on startup; readiness flips
            # only after pre-warm completes so kubelet doesn't kill
            # mid-warm and Service endpoints don't see traffic until
            # the worker is hot.
            image:
              repository: ghcr.io/varashi/scaleplex_worker
              tag: sha-08b3ebb
            env:
              TZ: Europe/Brussels
              # All knobs (HW_RENDER_DEVICE, HW_VAAPI_DRIVER,
              # HW_FONTS_DIR, WORKER_MAX_SESSIONS) default sensibly.
              # Encoder choice
              # (h264_vaapi vs hevc_vaapi) is driven by PMS argv —
              # Plex picks libx264/libx265 per session from server
              # prefs + client caps, worker maps 1:1 to the VAAPI
              # variant. No worker-side override. Sub burn-in is
              # fork-native (Phase 2c hardcoded since sha-171e202):
              # rewriter keeps Plex's -map_inlineass + sidecar -i +
              # inlineass= filter (strips 4 Plex-only AVOption keys),
              # scaleplex-ffmpeg7's scaleplex_inlineass binding
              # consumes the sub stream via side-channel, vf_inlineass
              # renders via libass under a process-wide mutex with a
              # pre-graph chunk buffer (Phase 2b).
              WORKER_DUMP_ARGV: "1"
            probes:
              liveness: { enabled: true, custom: true, spec: { httpGet: { path: /healthz, port: 3501 }, periodSeconds: 10, failureThreshold: 3 } }
              readiness: { enabled: true, custom: true, spec: { httpGet: { path: /readyz, port: 3501 }, periodSeconds: 2, failureThreshold: 60 } }
              startup: { enabled: true, custom: true, spec: { httpGet: { path: /healthz, port: 3501 }, periodSeconds: 1, failureThreshold: 30 } }
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
            # CAP_PERFMON lets the worker open i915 PMU events via
            # perf_event_open(2). Required only on kernels that have
            # dropped the per-engine sysfs busy file (Arc on i915 ≥ 6.5,
            # xe driver). Older Intel iGPUs use the sysfs reader and
            # don't need the cap; granting it harms nothing because
            # PERFMON is strictly narrower than the legacy SYS_ADMIN
            # path it replaced (kernel 5.8+).
            #
            # allowPrivilegeEscalation MUST be true: the worker binary
            # carries cap_perfmon=ep (file capability set in the
            # Dockerfile) so a non-root (uid 1000) process gets the cap
            # bits on exec. With allowPrivilegeEscalation:false the
            # kernel sets no_new_privs which forbids that bit promotion.
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add: ["PERFMON"]
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          # uid 1000 / gid 100 (`users`) match the worker Dockerfile's
          # `useradd -u 1000 -g users`. supplementalGroups: 44=video,
          # 568=render — both needed for /dev/dri/renderD128 access via
          # the Intel device plugin.
          securityContext:
            runAsUser: 1000
            runAsGroup: 100
            supplementalGroups: [44, 568]
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "3501"
            prometheus.io/path: /metrics
          terminationGracePeriodSeconds: 30

    serviceAccount:
      pms:
        forceRename: pms

    service:
      orchestrator:
        controller: orchestrator
        ports:
          http:
            port: 3500
      pms:
        controller: pms
        ports:
          http:
            port: 32400
          # scaleplex-relay listens here. Workers POST progress /
          # manifest / segment_list updates to plex-test-pms:32499;
          # relay forwards to 127.0.0.1:32400 so PMS sees a loopback
          # source address (which is what its session endpoints
          # require for accepting non-public callbacks).
          relay:
            port: 32499
      pms-lb:
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "172.16.4.106"
          external-dns.alpha.kubernetes.io/hostname: "plex-test-svc.${SECRET_DOMAIN}"
        externalTrafficPolicy: Local
        controller: pms
        ports:
          http:
            port: 32400
          # 32401 mirrors WAN port-fwd. Single customConnections URL
          # (https://plex-test-svc.boeye.net:32401) works LAN + WAN —
          # avoids split-DNS port mismatch with the legacy plex on 32400.
          external:
            port: 32401
            targetPort: 32400
      worker:
        # Headless Service — orchestrator does DNS lookup and gets a
        # list of pod IPs back. ClusterIP would mask the per-pod
        # addresses behind a single VIP and break per-worker /capability
        # polling.
        controller: worker
        clusterIP: None
        ports:
          http:
            port: 3501
      plex-test-public:
        controller: pms
        type: ExternalName
        externalName: skw.wan.${SECRET_DOMAIN}
        annotations:
          external-dns.alpha.kubernetes.io/hostname: plex-test.${SECRET_DOMAIN},plex-test-svc.${SECRET_DOMAIN}
          external-dns.alpha.kubernetes.io/public: "true"
        ports:
          http:
            port: 32400

    route:
      app:
        hostnames:
          - "plex-test.${SECRET_DOMAIN}"
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: pms
                port: http

    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: plex-test-config-vsan
        advancedMounts:
          pms:
            app:
              - path: /config
      transcode:
        # Shared between PMS (serves segments) and worker (writes
        # segments). scaleplex-agent writes segments at the same paths
        # PMS expects, no LOCAL_RELAY HTTP hop.
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/plex-test-transcode
        advancedMounts:
          pms:
            app:
              - path: /transcode
          worker:
            app:
              - path: /transcode
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media
        advancedMounts:
          pms:
            app:
              - path: /media
          worker:
            # Worker reads source media + probes for sidecar SRT/ASS
            # files (rewriter's hybrid-inlineass mode looks for
            # <basename>.srt etc. next to the source). Writable for
            # Plex Optimize jobs, which output the optimized MP4 +
            # subtitle sidecars under <library>/Plex Versions/Optimized
            # for TV/.../*.mp4 — that path lives inside /media, not
            # /transcode. Live streaming still writes only under
            # /transcode; the rewriter never targets /media for
            # session output.
            app:
              - path: /media
