---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: belgian-dl
  namespace: belgian-dl
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
    controllers:
      belgian-dl:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/varashi/be-stream-downloader
              tag: main@sha256:558d7dd0f1b02bfd8185a8db4063d7c28ff8411cf6c23ad71c07059ca16b0867
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
              PUID: "1000"
              PGID: "1000"
              TITLE: Belgian Downloader
              KEYBOARD: nl-be-azerty
              XKB_DEFAULT_LAYOUT: be
            resources:
              requests:
                cpu: 300m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: belgian-dl
        ports:
          http:
            port: 3000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Belgian Downloader
          gethomepage.dev/description: VRT MAX grabber
          gethomepage.dev/group: Media
          gethomepage.dev/weight: "90"
          gethomepage.dev/icon: firefox.png
          gethomepage.dev/href: https://belgian-dl.${SECRET_DOMAIN}
          gatus.home-operations.com/endpoint: |
            conditions: ["[STATUS] < 500"]
            interval: 60s
            group: media
        hostnames:
          - belgian-dl.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: belgian-dl-config
        globalMounts:
          - path: /config
      downloads:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/downloads/belgian-dl
        globalMounts:
          - path: /downloads
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media
        globalMounts:
          - path: /media
      # KasmVNC / openbox need /dev/shm; tmpfs keeps it off disk
      dshm:
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        globalMounts:
          - path: /dev/shm
