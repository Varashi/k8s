---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clusterplex-pms
  namespace: clusterplex
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clusterplex-pms-worker-restart
  namespace: clusterplex
rules:
  # PMS pod's postStart hook needs to roll the worker DaemonSet so workers
  # drop their stale EAE state when the PMS UUID changes on restart.
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    resourceNames: ["clusterplex-worker"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clusterplex-pms-worker-restart
  namespace: clusterplex
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clusterplex-pms-worker-restart
subjects:
  - kind: ServiceAccount
    name: clusterplex-pms
    namespace: clusterplex
