---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clusterplex
  namespace: clusterplex
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    disableWait: true
    remediation:
      retries: 3
  values:
    controllers:
      orchestrator:
        containers:
          app:
            # Forked orchestrator with HW arg rewriter
            # (https://github.com/Varashi/clusterplex/tree/rewriter-plan).
            # Flag stays off until we validate the image as a no-op replacement.
            image:
              repository: ghcr.io/varashi/clusterplex_orchestrator
              tag: rewriter-plan
            env:
              TZ: Europe/Brussels
              LISTENING_PORT: "3500"
              WORKER_SELECTION_STRATEGY: "LOAD_RANK"
              HW_ARG_REWRITE_ENABLED: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            supplementalGroups: [568]
            seccompProfile:
              type: RuntimeDefault
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

      pms:
        serviceAccount:
          identifier: pms
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            env:
              TZ: Europe/Brussels
              VERSION: docker
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              DOCKER_MODS: "ghcr.io/pabloromeo/clusterplex_dockermod:1.4.16"
              ORCHESTRATOR_URL: "http://clusterplex-orchestrator.clusterplex.svc:3500"
              PMS_SERVICE: "clusterplex-pms.clusterplex.svc"
              PMS_PORT: "32400"
              # LOCAL_RELAY_ENABLED=0 was attempted but dockermod's off-path is
              # buggy: nginx still configured, transcoder.js silently aborts.
              # Keeping relay on — adds ~10s overhead but works reliably.
              LOCAL_RELAY_ENABLED: "1"
              LOCAL_RELAY_PORT: "32499"
              TRANSCODE_OPERATING_MODE: "remote"
            # No GPU on PMS: orchestrator's HW arg rewriter translates Plex's
            # SW commands (libdav1d/libx264) into VAAPI on the way to workers.
            # PMS pinned to GPU nodes only because Longhorn /config replicas
            # live there (Longhorn CSI installed only on gpu-workers).
            # On every PMS start, force-roll the worker DaemonSet so workers
            # drop stale EAE state from the previous PMS UUID. Patches the DS
            # via the k8s API using the pod's SA token (no kubectl needed).
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/bash
                    - -c
                    - |
                      TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                      curl -fsSL --max-time 10 \
                        --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                        -H "Authorization: Bearer $TOKEN" \
                        -H "Content-Type: application/strategic-merge-patch+json" \
                        -X PATCH \
                        "https://kubernetes.default.svc/apis/apps/v1/namespaces/clusterplex/daemonsets/clusterplex-worker" \
                        -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"clusterplex.boeye.net/restartedAt\":\"$(date -u +%FT%TZ)\"}}}}}" \
                        > /tmp/worker-restart.log 2>&1 || true
        pod:
          # GPU nodes only — for Longhorn /config locality. No GPU resource
          # claim, no /dev/dri. Taint is PreferNoSchedule (soft), no
          # toleration needed.
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

      worker:
        type: daemonset
        initContainers:
          # bjw-s app-template orders initContainers alphabetically; the 1- / 2-
          # prefixes preserve ordering. driver-1-url runs first, driver-2-fetch second.
          # Step 1: extract driver URL from PMS binary (lsio image has the binary).
          driver-1-url:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            # Run as uid 1000 so NFS root_squash doesn't block writes to
            # /drivers (dir owned 1000:1000 on TrueNAS).
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                PMS_BIN="/usr/lib/plexmediaserver/Plex Media Server"
                URL=$(grep -aoE 'https://downloads\.plex\.tv/intel-media-driver/imd-[a-f0-9]+-linux-x86_64\.zip' "$PMS_BIN" | head -1)
                if [ -z "$URL" ]; then
                  echo "ERROR: imd URL not found in PMS binary" >&2
                  exit 1
                fi
                echo "$URL" > /drivers/.url
                echo "$URL" | grep -oE 'imd-[a-f0-9]+' > /drivers/.imd-hash-target
                echo "URL: $URL"
          # Step 2: fetch + extract. Alpine has fast apk; ubuntu's apt is too slow here.
          driver-2-fetch:
            image:
              repository: alpine
              tag: "3.20"
            # apk install needs root, but NFS has root_squash so writes to
            # /drivers (owned 1000:1000) must be done as uid 1000. Run as
            # root, then su-exec into 1000 for the actual download/extract.
            securityContext:
              runAsUser: 0
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                DRIVERS_DIR=/drivers
                HASH=$(cat "$DRIVERS_DIR/.imd-hash-target")
                if [ -f "$DRIVERS_DIR/.imd-hash" ] && [ "$(cat "$DRIVERS_DIR/.imd-hash")" = "$HASH" ] && [ -f "$DRIVERS_DIR/iHD_drv_video.so" ]; then
                  echo "Driver $HASH already present, skipping"
                  exit 0
                fi
                apk add --no-cache curl unzip su-exec
                URL=$(cat "$DRIVERS_DIR/.url")
                echo "Fetching $URL"
                su-exec 1000:1000 sh -eu -c "
                  find \"$DRIVERS_DIR\" -maxdepth 1 -name '*.so' -delete
                  curl -fsSL '$URL' -o /tmp/imd.zip
                  # -j flattens path so iHD_drv_video.so lands at \$DRIVERS_DIR root,
                  # matching the LIBVA_DRIVERS_PATH that PMS sends to the worker.
                  unzip -oj /tmp/imd.zip -d '$DRIVERS_DIR'
                  rm /tmp/imd.zip '$DRIVERS_DIR/.url' '$DRIVERS_DIR/.imd-hash-target'
                  echo '$HASH' > '$DRIVERS_DIR/.imd-hash'
                  echo 'Done: $DRIVERS_DIR/iHD_drv_video.so'
                "
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            env:
              TZ: Europe/Brussels
              VERSION: docker
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              DOCKER_MODS: "ghcr.io/pabloromeo/clusterplex_worker_dockermod:1.4.16"
              ORCHESTRATOR_URL: "http://clusterplex-orchestrator.clusterplex.svc:3500"
              LISTENING_PORT: "3501"
              # LIBVA env intentionally absent on the worker container:
              # PMS injects LIBVA_DRIVERS_PATH per-transcode pointing at its own
              # /config path. The worker mount below makes that path resolve.
            resources:
              limits:
                gpu.intel.com/i915: 1
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: "intel.feature.node.kubernetes.io/gpu"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          securityContext:
            supplementalGroups: [568]

    serviceAccount:
      pms:
        forceRename: pms

    configMaps:
      worker-setup-codecs-fix:
        forceRename: clusterplex-worker-setup-codecs-fix
        data:
          run: |
            #!/usr/bin/with-contenv bash
            echo "**** Setting up codecs directory (NFS-aware) ****"
            mkdir -p /codecs
            # /codecs is an NFS share already owned 1000:1000; chown as root
            # fails under root_squash but the result is already correct, so
            # ignore failure and let the s6 chain proceed.
            chown abc:abc /codecs 2>/dev/null || echo "skip chown — NFS already 1000:1000"
            exit 0

    service:
      orchestrator:
        controller: orchestrator
        ports:
          http:
            port: 3500
      pms:
        controller: pms
        ports:
          http:
            port: 32400
          relay:
            port: 32499
      pms-lb:
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "172.16.4.106"
          external-dns.alpha.kubernetes.io/hostname: "clusterplex-pms.${SECRET_DOMAIN}"
        externalTrafficPolicy: Local
        controller: pms
        ports:
          http:
            port: 32400
      worker:
        controller: worker
        ports:
          http:
            port: 3501
      clusterplex-public:
        controller: pms
        type: ExternalName
        externalName: skw.wan.${SECRET_DOMAIN}
        annotations:
          external-dns.alpha.kubernetes.io/hostname: clusterplex.${SECRET_DOMAIN}
          external-dns.alpha.kubernetes.io/public: "true"
        ports:
          http:
            port: 32400

    route:
      app:
        hostnames:
          - "clusterplex.${SECRET_DOMAIN}"
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: pms
                port: http

    persistence:
      drivers:
        # Shared NFS cache so the iHD driver survives pod restarts cluster-wide.
        # First worker to boot after a Plex version bump downloads it; others
        # see .imd-hash matching and skip.
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/clusterplexcache/drivers
        advancedMounts:
          worker:
            driver-1-url:
              - path: /drivers
            driver-2-fetch:
              - path: /drivers
            app:
              # Mount at the LIBVA_DRIVERS_PATH that PMS injects per-task,
              # so worker's libva finds iHD_drv_video.so when PMS forwards
              # the transcode env.
              - path: "/config/Library/Application Support/Plex Media Server/Cache/va-dri-linux-x86_64"
                readOnly: true
      codecs:
        # Shared NFS cache for Plex codec/EAE downloads; saves the
        # ~50-file wget loop on every cold worker boot.
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/clusterplexcache/codecs
        advancedMounts:
          worker:
            app:
              - path: /codecs
      setup-codecs-fix:
        # Override clusterplex_worker_dockermod's s6 setup-codecs-dir script:
        # original chown'd /codecs and exited 1 on NFS (root_squash), blocking
        # init-mods-end → svc-plex. Replacement skips the chown since /codecs
        # is already owned correctly on NFS.
        type: configMap
        name: clusterplex-worker-setup-codecs-fix
        defaultMode: 0755
        advancedMounts:
          worker:
            app:
              - path: /etc/s6-overlay/s6-rc.d/4-setup-codecs-dir/run
                subPath: run
      config:
        type: persistentVolumeClaim
        existingClaim: clusterplex-config
        advancedMounts:
          pms:
            app:
              - path: /config
      transcode:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/clusterplextranscode
        advancedMounts:
          pms:
            app:
              - path: /transcode
          worker:
            app:
              - path: /transcode
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media
        advancedMounts:
          pms:
            app:
              - path: /media
          worker:
            app:
              - path: /media
