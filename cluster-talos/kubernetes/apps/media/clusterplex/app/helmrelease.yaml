---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clusterplex
  namespace: clusterplex
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      orchestrator:
        containers:
          app:
            image:
              repository: ghcr.io/pabloromeo/clusterplex_orchestrator
              tag: 1.4.16
            env:
              TZ: Europe/Brussels
              LISTENING_PORT: "3500"
              WORKER_SELECTION_STRATEGY: "LOAD_RANK"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            supplementalGroups: [568]
            seccompProfile:
              type: RuntimeDefault
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

      pms:
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            env:
              TZ: Europe/Brussels
              VERSION: docker
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              DOCKER_MODS: "ghcr.io/pabloromeo/clusterplex_dockermod:1.4.16"
              ORCHESTRATOR_URL: "http://clusterplex-orchestrator.clusterplex.svc:3500"
              PMS_SERVICE: "clusterplex-pms.clusterplex.svc"
              PMS_PORT: "32400"
              LOCAL_RELAY_ENABLED: "1"
              LOCAL_RELAY_PORT: "32499"
              TRANSCODE_OPERATING_MODE: "remote"
            resources:
              limits:
                gpu.intel.com/i915: 1
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: "intel.feature.node.kubernetes.io/gpu"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          securityContext:
            supplementalGroups: [568]

      worker:
        type: daemonset
        initContainers:
          # Step 1: extract driver URL from PMS binary (lsio image has the binary).
          driver-url:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                PMS_BIN="/usr/lib/plexmediaserver/Plex Media Server"
                URL=$(grep -aoE 'https://downloads\.plex\.tv/intel-media-driver/imd-[a-f0-9]+-linux-x86_64\.zip' "$PMS_BIN" | head -1)
                if [ -z "$URL" ]; then
                  echo "ERROR: imd URL not found in PMS binary" >&2
                  exit 1
                fi
                echo "$URL" > /drivers/.url
                echo "$URL" | grep -oE 'imd-[a-f0-9]+' > /drivers/.imd-hash-target
                echo "URL: $URL"
          # Step 2: fetch + extract. Alpine has fast apk; ubuntu's apt is too slow here.
          driver-fetch:
            image:
              repository: alpine
              tag: "3.20"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                DRIVERS_DIR=/drivers
                URL=$(cat "$DRIVERS_DIR/.url")
                HASH=$(cat "$DRIVERS_DIR/.imd-hash-target")
                if [ -f "$DRIVERS_DIR/.imd-hash" ] && [ "$(cat "$DRIVERS_DIR/.imd-hash")" = "$HASH" ] && [ -f "$DRIVERS_DIR/dri/iHD_drv_video.so" ]; then
                  echo "Driver $HASH already present, skipping"
                  exit 0
                fi
                apk add --no-cache curl unzip
                echo "Fetching $URL"
                find "$DRIVERS_DIR" -maxdepth 1 -name "*.so" -delete
                curl -fsSL "$URL" -o /tmp/imd.zip
                # -j flattens path so iHD_drv_video.so lands at $DRIVERS_DIR root,
                # matching the LIBVA_DRIVERS_PATH that PMS sends to the worker.
                unzip -oj /tmp/imd.zip -d "$DRIVERS_DIR"
                rm /tmp/imd.zip "$DRIVERS_DIR/.url" "$DRIVERS_DIR/.imd-hash-target"
                echo "$HASH" > "$DRIVERS_DIR/.imd-hash"
                echo "Done: $DRIVERS_DIR/dri/iHD_drv_video.so"
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.1.10611-1e34174b1-ls303
            env:
              TZ: Europe/Brussels
              VERSION: docker
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              DOCKER_MODS: "ghcr.io/pabloromeo/clusterplex_worker_dockermod:1.4.16"
              ORCHESTRATOR_URL: "http://clusterplex-orchestrator.clusterplex.svc:3500"
              LISTENING_PORT: "3501"
              # LIBVA env intentionally absent on the worker container:
              # PMS injects LIBVA_DRIVERS_PATH per-transcode pointing at its own
              # /config path. The worker mount below makes that path resolve.
            resources:
              limits:
                gpu.intel.com/i915: 1
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: "intel.feature.node.kubernetes.io/gpu"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          securityContext:
            supplementalGroups: [568]

    service:
      orchestrator:
        controller: orchestrator
        ports:
          http:
            port: 3500
      pms:
        controller: pms
        ports:
          http:
            port: 32400
          relay:
            port: 32499
      pms-lb:
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "172.16.4.106"
          external-dns.alpha.kubernetes.io/hostname: "clusterplex-pms.${SECRET_DOMAIN}"
        externalTrafficPolicy: Local
        controller: pms
        ports:
          http:
            port: 32400
      worker:
        controller: worker
        ports:
          http:
            port: 3501
      clusterplex-public:
        controller: pms
        type: ExternalName
        externalName: skw.wan.${SECRET_DOMAIN}
        annotations:
          external-dns.alpha.kubernetes.io/hostname: clusterplex.${SECRET_DOMAIN}
          external-dns.alpha.kubernetes.io/public: "true"
        ports:
          http:
            port: 32400

    route:
      app:
        hostnames:
          - "clusterplex.${SECRET_DOMAIN}"
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: pms
                port: http

    persistence:
      drivers:
        type: emptyDir
        advancedMounts:
          worker:
            driver-url:
              - path: /drivers
            driver-fetch:
              - path: /drivers
            app:
              # Mount at the LIBVA_DRIVERS_PATH that PMS injects per-task,
              # so worker's libva finds iHD_drv_video.so when PMS forwards
              # the transcode env.
              - path: "/config/Library/Application Support/Plex Media Server/Cache/va-dri-linux-x86_64"
                readOnly: true
      config:
        type: persistentVolumeClaim
        existingClaim: clusterplex-config
        advancedMounts:
          pms:
            app:
              - path: /config
      transcode:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/clusterplextranscode
        advancedMounts:
          pms:
            app:
              - path: /transcode
          worker:
            app:
              - path: /transcode
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media
        advancedMounts:
          pms:
            app:
              - path: /media
          worker:
            app:
              - path: /media
