apiVersion: v1
kind: Namespace
metadata:
  name: clusterplex
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
    # Kasten backup intentionally OFF for clusterplex — this is a test
    # PMS instance that gets rebuilt frequently, and the in-cluster
    # CSI snapshot Kasten takes blocks PVC expansion (vSphere CSI
    # rejects `resize volume with existing snapshots`). Production
    # plex is unaffected and remains backed up.
