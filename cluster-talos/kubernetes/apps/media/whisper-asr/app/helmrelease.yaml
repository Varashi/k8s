---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whisper-asr
  namespace: whisper-asr
spec:
  interval: 30m
  install:
    timeout: 15m
    remediation:
      retries: 2
  upgrade:
    timeout: 15m
    remediation:
      retries: 2
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      whisper-asr:
        containers:
          app:
            image:
              repository: onerahmet/openai-whisper-asr-webservice
              tag: v1.9.1@sha256:03b402335881cdab2e4939b24620809df8d6ceec3bf2712217d41c8761a0f5d4
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
              ASR_ENGINE: faster_whisper
              ASR_MODEL: small
            resources:
              requests:
                cpu: 250m
                memory: 2Gi
              limits:
                cpu: "2"
    service:
      app:
        controller: whisper-asr
        ports:
          http:
            port: 9000
    persistence:
      cache:
        existingClaim: whisper-asr-cache
        globalMounts:
          - path: /root/.cache
