---
# CNPG initdb bootstrap creds (basic-auth)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ombi-db-credentials
  namespace: ombi
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: ombi-db-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: ombi
        password: "{{ .dbPassword }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_OMBI_POSTGRES_PASSWORD
---
# Renders /config/database.json content for Ombi (3-DB postgres split)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ombi-database-json
  namespace: ombi
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: ombi-database-json
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        database.json: |
          {
            "OmbiDatabase": {
              "Type": "Postgres",
              "ConnectionString": "Host=ombi-pg-rw.ombi.svc;Port=5432;Database=ombi;Username=ombi;Password={{ .dbPassword }}"
            },
            "SettingsDatabase": {
              "Type": "Postgres",
              "ConnectionString": "Host=ombi-pg-rw.ombi.svc;Port=5432;Database=ombi_settings;Username=ombi;Password={{ .dbPassword }}"
            },
            "ExternalDatabase": {
              "Type": "Postgres",
              "ConnectionString": "Host=ombi-pg-rw.ombi.svc;Port=5432;Database=ombi_external;Username=ombi;Password={{ .dbPassword }}"
            }
          }
  data:
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_OMBI_POSTGRES_PASSWORD
