---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ombi
  namespace: ombi
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 0
        runAsGroup: 0
    controllers:
      ombi:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/ombi
              tag: 4.53.4
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
    service:
      app:
        controller: ombi
        ports:
          http:
            port: 3579
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Ombi
          gethomepage.dev/description: Plex requests
          gethomepage.dev/group: Media
          gethomepage.dev/weight: "40"
          gethomepage.dev/icon: ombi.png
          gethomepage.dev/href: https://plexrequests.${SECRET_DOMAIN}
          gethomepage.dev/widget.type: ombi
          gethomepage.dev/widget.url: http://ombi.ombi.svc:3579
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_OMBI}}`}}"
        hostnames:
          - plexrequests.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: ombi-config
        globalMounts:
          - path: /config
      database-json:
        type: secret
        name: ombi-database-json
        globalMounts:
          - path: /config/database.json
            subPath: database.json
            readOnly: true
