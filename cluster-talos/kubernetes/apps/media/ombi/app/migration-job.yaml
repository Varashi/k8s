---
# One-shot migration: copy data from sqlite (Ombi.db / OmbiSettings.db / OmbiExternal.db)
# into the EF Core-bootstrapped postgres schema in the cnpg cluster.
#
# Manual apply only — NOT in kustomization.yaml.
# Workflow:
#   1. Apply cluster.yaml + externalsecret.yaml + helmrelease.yaml; let Ombi start once
#      against empty postgres so EF Core migrations create the schema in all 3 DBs.
#   2. Verify schema exists, then `kubectl scale deploy/ombi -n ombi --replicas=0`.
#   3. `kubectl apply -f migration-job.yaml`. Watch logs.
#   4. On success, scale ombi back to 1.
#   5. After verification: `kubectl delete -f migration-job.yaml` and rename sqlite files
#      in /config to *.db.preMigration as a safety backup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ombi-pg-migration-script
  namespace: ombi
data:
  migrate.py: |
    #!/usr/bin/env python3
    """
    sqlite -> postgres data-only migration for Ombi.
    Assumes EF Core has already created the target schema in postgres.
    Bool/datetime adaptation done per-column from PG information_schema.
    Sequences reset after bulk load.
    """
    import os
    import sqlite3
    import sys
    import psycopg2

    PG_HOST = os.environ.get("PG_HOST", "ombi-pg-rw.ombi.svc")
    PG_USER = os.environ.get("PG_USER", "ombi")
    PG_PASS = os.environ["DB_PASSWORD"]

    PAIRS = [
        ("/sqlite/Ombi.db",         "ombi"),
        ("/sqlite/OmbiSettings.db", "ombi_settings"),
        ("/sqlite/OmbiExternal.db", "ombi_external"),
    ]

    # Npgsql lowercases identifiers; sqlite uses PascalCase. Match case-insensitively
    # both for tables and columns.
    SKIP_TABLES_LC = {"__efmigrationshistory"}


    def list_sqlite_tables(sconn):
        rows = sconn.execute(
            "SELECT name FROM sqlite_master WHERE type='table' "
            "AND name NOT LIKE 'sqlite_%'"
        ).fetchall()
        return [r[0] for r in rows if r[0].lower() not in SKIP_TABLES_LC]


    def pg_tables(pconn):
        """Return dict: lowercase_name -> actual_name."""
        cur = pconn.cursor()
        cur.execute(
            "SELECT table_name FROM information_schema.tables "
            "WHERE table_schema='public'"
        )
        return {r[0].lower(): r[0] for r in cur.fetchall()}


    def pg_columns(pconn, table):
        """Return dict: lowercase_name -> (actual_name, data_type)."""
        cur = pconn.cursor()
        cur.execute(
            "SELECT column_name, data_type FROM information_schema.columns "
            "WHERE table_schema='public' AND table_name=%s "
            "ORDER BY ordinal_position",
            (table,),
        )
        return {r[0].lower(): (r[0], r[1]) for r in cur.fetchall()}


    def sqlite_columns(sconn, table):
        cur = sconn.execute(f'SELECT * FROM "{table}" LIMIT 0')
        return [d[0] for d in cur.description]


    def adapt_value(value, pg_type):
        if value is None:
            return None
        if pg_type == "boolean":
            return bool(value)
        return value


    def reset_sequences(pconn, pg_table):
        cur = pconn.cursor()
        cur.execute(
            "SELECT column_name FROM information_schema.columns "
            "WHERE table_schema='public' AND table_name=%s "
            "AND (column_default LIKE 'nextval%%' OR is_identity='YES')",
            (pg_table,),
        )
        for (col,) in cur.fetchall():
            try:
                cur.execute(
                    'SELECT setval(pg_get_serial_sequence(%s, %s), '
                    'COALESCE((SELECT MAX("' + col + '") FROM "' + pg_table + '"), 1))',
                    (pg_table, col),
                )
            except Exception as e:
                print(f"  seq reset skipped {pg_table}.{col}: {e}")


    def migrate_one(sqlite_path, pg_db):
        print(f"\n=== {sqlite_path} -> {pg_db} ===")
        if not os.path.exists(sqlite_path):
            print(f"  MISSING {sqlite_path}; skipping")
            return
        sconn = sqlite3.connect(sqlite_path)
        pconn = psycopg2.connect(
            host=PG_HOST, user=PG_USER, password=PG_PASS, dbname=pg_db
        )
        pconn.autocommit = False
        try:
            stables = list_sqlite_tables(sconn)
            ptables_map = pg_tables(pconn)
            print(f"  sqlite tables: {len(stables)}, pg tables: {len(ptables_map)}")
            cur = pconn.cursor()
            migrated_pg_tables = []
            for stable in stables:
                ptable = ptables_map.get(stable.lower())
                if not ptable:
                    print(f"  SKIP {stable} (not in pg)")
                    continue
                scols = sqlite_columns(sconn, stable)
                pcols_map = pg_columns(pconn, ptable)
                # Build [(sqlite_col, pg_col, pg_type)] for columns present in both
                col_pairs = []
                for sc in scols:
                    pc = pcols_map.get(sc.lower())
                    if pc:
                        col_pairs.append((sc, pc[0], pc[1]))
                if not col_pairs:
                    print(f"  SKIP {stable} (no overlapping cols)")
                    continue
                cur.execute(f'TRUNCATE TABLE "{ptable}" RESTART IDENTITY CASCADE')
                ssel = ",".join(f'"{c[0]}"' for c in col_pairs)
                psel = ",".join(f'"{c[1]}"' for c in col_pairs)
                rows = sconn.execute(f'SELECT {ssel} FROM "{stable}"').fetchall()
                if rows:
                    types = [c[2] for c in col_pairs]
                    adapted = [
                        [adapt_value(v, t) for v, t in zip(row, types)]
                        for row in rows
                    ]
                    placeholders = ",".join(["%s"] * len(col_pairs))
                    cur.executemany(
                        f'INSERT INTO "{ptable}" ({psel}) VALUES ({placeholders})',
                        adapted,
                    )
                migrated_pg_tables.append(ptable)
                print(f"  {stable} -> {ptable}: {len(rows)} rows")
            pconn.commit()
            for pt in migrated_pg_tables:
                reset_sequences(pconn, pt)
            pconn.commit()
        except Exception:
            pconn.rollback()
            raise
        finally:
            sconn.close()
            pconn.close()


    if __name__ == "__main__":
        for path, db in PAIRS:
            migrate_one(path, db)
        print("\nMigration complete.")
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ombi-pg-migration
  namespace: ombi
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      containers:
        - name: migrate
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              pip install --no-cache-dir psycopg2-binary
              python3 /script/migrate.py
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ombi-db-credentials
                  key: password
          volumeMounts:
            - name: sqlite
              mountPath: /sqlite
              readOnly: true
            - name: script
              mountPath: /script
      volumes:
        - name: sqlite
          persistentVolumeClaim:
            claimName: ombi-config
        - name: script
          configMap:
            name: ombi-pg-migration-script
