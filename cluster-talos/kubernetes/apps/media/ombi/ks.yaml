---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ombi
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: cloudflare-operator
  path: ./cluster-talos/kubernetes/apps/media/ombi/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
