---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: be-stream-downloader
  namespace: be-stream-downloader
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups: [568]
      imagePullSecrets:
        - name: ghcr-pull-secret
    controllers:
      be-stream-downloader:
        containers:
          app:
            image:
              repository: ghcr.io/varashi/be-stream-downloader
              tag: latest
              pullPolicy: Always
            envFrom:
              - secretRef:
                  name: be-stream-downloader-secrets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "2"
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jobs
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jobs
                    port: 8000
                  initialDelaySeconds: 5
                  periodSeconds: 10
    service:
      app:
        controller: be-stream-downloader
        ports:
          http:
            port: 8000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: BeStreamDL
          gethomepage.dev/description: VRT MAX downloader
          gethomepage.dev/group: Media
          gethomepage.dev/weight: "60"
          gethomepage.dev/href: https://bedl.${SECRET_DOMAIN}
        hostnames:
          - bedl.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        type: persistentVolumeClaim
        # Explicit name avoids reusing the previous longhorn PVC (which
        # would have been be-stream-downloader by bjw-s default).
        name: be-stream-downloader-data
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: vsan
        globalMounts:
          - path: /data
      wvd:
        type: secret
        name: be-stream-downloader-wvd
        defaultMode: 0400
        globalMounts:
          - path: /wvd
            readOnly: true
      downloads:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media/SeriesNL
        globalMounts:
          - path: /downloads
