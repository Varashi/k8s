---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: be-stream-downloader
  namespace: be-stream-downloader
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups: [568]
      imagePullSecrets:
        - name: ghcr-pull-secret
    controllers:
      be-stream-downloader:
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/varashi/be-stream-downloader
              repository: ghcr.io/varashi/be-stream-downloader
              tag: 97431356bcfcc7d56b9c81ade1920a0ef8213daf@sha256:f35d8f12acfe2024732ee7d1f6ba9b97b637d508be8019614894bb1703dc1a86
              pullPolicy: IfNotPresent
            env:
              # Image default is /downloads; remap because we mount the
              # media library directly (no staging area).
              DOWNLOADS_DIR: /media
              # /media is mounted at the parent of all libraries — this is
              # the default subfolder applied when no per-show/per-season
              # library override is set. Picks up existing files at
              # /media/SeriesNL/<show>/...
              MEDIA_LIBRARY_DEFAULT: SeriesNL
              # In-cluster Plex URL; PLEX_TOKEN comes from the ESO secret.
              PLEX_URL: http://plex.plex.svc:32400
            envFrom:
              - secretRef:
                  name: be-stream-downloader-secrets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                # Serial-only execution (BEDL_MAX_CONCURRENT_DOWNLOADS=1):
                # one n-m3u8dl-re peaks ~1.5 cores + ~600 MiB during a 4 Mbps
                # DASH decode; this leaves headroom for a concurrent show
                # refresh scrape and the FastAPI event loop without slack.
                cpu: "2"
                memory: 2Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jobs
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jobs
                    port: 8000
                  initialDelaySeconds: 5
                  periodSeconds: 10
    service:
      app:
        controller: be-stream-downloader
        ports:
          http:
            port: 8000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: BeStreamDL
          gethomepage.dev/description: VRT MAX + VTM GO downloader
          gethomepage.dev/group: Media
          gethomepage.dev/weight: "60"
          gethomepage.dev/href: https://bedl.${SECRET_DOMAIN}
        hostnames:
          - bedl.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        type: persistentVolumeClaim
        # PVC pre-created in pvc.yaml (vsan); using existingClaim avoids
        # bjw-s reusing the previous longhorn PVC name and trying to
        # mutate its immutable spec.
        existingClaim: be-stream-downloader-data
        globalMounts:
          - path: /data
      wvd:
        type: secret
        name: be-stream-downloader-wvd
        defaultMode: 0400
        globalMounts:
          - path: /wvd
            readOnly: true
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        # Mount the parent so per-show overrides can target sibling
        # libraries (Series, Movies, MoviesNL, ...). MEDIA_LIBRARY_DEFAULT
        # above keeps existing shows resolving under SeriesNL/.
        path: /mnt/DATA/mediapool/media
        globalMounts:
          - path: /media
