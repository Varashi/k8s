---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: be-stream-downloader
  namespace: be-stream-downloader
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups: [568]
      imagePullSecrets:
        - name: ghcr-pull-secret
    controllers:
      be-stream-downloader:
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/varashi/be-stream-downloader
              repository: ghcr.io/varashi/be-stream-downloader
              tag: 0d034ced83fcedf7ce23ee93ebb7fc8facd53a4b@sha256:6ae9f9385edcea79c0c5f25c47534d0d1bdb6fd7a70d41e583192906bfac91e5
              pullPolicy: IfNotPresent
            env:
              # Image default is /downloads; remap because we mount the
              # media library directly (no staging area).
              DOWNLOADS_DIR: /media
            envFrom:
              - secretRef:
                  name: be-stream-downloader-secrets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "2"
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jobs
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jobs
                    port: 8000
                  initialDelaySeconds: 5
                  periodSeconds: 10
    service:
      app:
        controller: be-stream-downloader
        ports:
          http:
            port: 8000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: BeStreamDL
          gethomepage.dev/description: VRT MAX downloader
          gethomepage.dev/group: Media
          gethomepage.dev/weight: "60"
          gethomepage.dev/href: https://bedl.${SECRET_DOMAIN}
        hostnames:
          - bedl.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        type: persistentVolumeClaim
        # PVC pre-created in pvc.yaml (vsan); using existingClaim avoids
        # bjw-s reusing the previous longhorn PVC name and trying to
        # mutate its immutable spec.
        existingClaim: be-stream-downloader-data
        globalMounts:
          - path: /data
      wvd:
        type: secret
        name: be-stream-downloader-wvd
        defaultMode: 0400
        globalMounts:
          - path: /wvd
            readOnly: true
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media/SeriesNL
        globalMounts:
          - path: /media
