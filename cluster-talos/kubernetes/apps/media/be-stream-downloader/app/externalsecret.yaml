---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: be-stream-downloader-secrets
  namespace: be-stream-downloader
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: be-stream-downloader-secrets
    creationPolicy: Owner
  data:
    - secretKey: VRT_EMAIL
      remoteRef:
        key: SECRET_VRT_EMAIL
    - secretKey: VRT_PASSWORD
      remoteRef:
        key: SECRET_VRT_PASSWORD
    - secretKey: PLEX_TOKEN
      remoteRef:
        key: SECRET_PLEX_TOKEN
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: be-stream-downloader-wvd
  namespace: be-stream-downloader
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: be-stream-downloader-wvd
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # BW SM stores the .wvd file as a base64 string. The Secret data
        # value is itself base64-encoded by Kubernetes, so we pass through
        # the BW SM value as-is — k8s decodes once on volume mount and the
        # original binary lands at /wvd/cdm.wvd.
        cdm.wvd: "{{ .wvd }}"
  data:
    - secretKey: wvd
      remoteRef:
        key: SECRET_BEDL_WVD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: be-stream-downloader
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "Varashi:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: SECRET_GHCR_PULL_TOKEN
