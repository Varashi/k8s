---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: be-stream-downloader-secrets
  namespace: be-stream-downloader
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: be-stream-downloader-secrets
    creationPolicy: Owner
  data:
    # Provider creds are intentionally NOT mapped here — testing the
    # /auth credentials editor as the bootstrap path. PVC-backed override
    # files at /data/.config/<provider>/creds.json supply credentials.
    # Re-add SECRET_*_EMAIL/SECRET_*_PASSWORD here if env-driven defaults
    # are desired again.
    - secretKey: PLEX_TOKEN
      remoteRef:
        key: SECRET_PLEX_TOKEN
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: be-stream-downloader-wvd
  namespace: be-stream-downloader
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: be-stream-downloader-wvd
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # BW SM holds the .wvd file as a base64 string. ESO v2 templating
        # auto-base64-encodes whatever lands under `data:`, so we must
        # render the *binary* here (b64dec → raw bytes) and let ESO + k8s
        # encode/decode once each. Net: /wvd/cdm.wvd is the original WVD.
        cdm.wvd: "{{ .wvd | b64dec }}"
  data:
    - secretKey: wvd
      remoteRef:
        key: SECRET_BEDL_WVD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: be-stream-downloader
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "Varashi:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: SECRET_GHCR_PULL_TOKEN
