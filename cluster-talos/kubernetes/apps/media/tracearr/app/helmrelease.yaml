---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
  namespace: tracearr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule

    controllers:
      redis:
        pod:
          securityContext:
            fsGroup: 1000
        containers:
          app:
            image:
              repository: redis
              tag: 8-alpine
            args:
              - redis-server
              - --appendonly
              - "yes"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

      tracearr:
        containers:
          app:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: latest
            envFrom:
              - secretRef:
                  name: tracearr-secrets
            env:
              TZ: Europe/Brussels
              NODE_ENV: production
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10

    service:
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
      app:
        controller: tracearr
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Tracearr
          gethomepage.dev/description: Plex sonarr/radarr trace
          gethomepage.dev/group: Media
          gethomepage.dev/icon: mdi-map-marker-path
          gethomepage.dev/href: https://tracearr.${SECRET_DOMAIN}
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames:
          - tracearr.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http

    persistence:
      redis-data:
        type: persistentVolumeClaim
        existingClaim: tracearr-redis-data
        advancedMounts:
          redis:
            app:
              - path: /data
      backups:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/backup/tracearr
        advancedMounts:
          tracearr:
            app:
              - path: /data/backup
