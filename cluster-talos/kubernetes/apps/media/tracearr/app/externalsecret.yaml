---
# CNPG initdb bootstrap creds (basic-auth)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tracearr-db-credentials
  namespace: tracearr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: tracearr-db-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: tracearr
        password: "{{ .dbPassword }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_TRACEARR_POSTGRES_PASSWORD
---
# App env (JWT, COOKIE, DATABASE_URL, REDIS_URL)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tracearr-secrets
  namespace: tracearr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: tracearr-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .jwt }}"
        COOKIE_SECRET: "{{ .cookie }}"
        DATABASE_URL: "postgresql://tracearr:{{ .dbPassword }}@tracearr-db-rw.tracearr.svc:5432/tracearr"
        REDIS_URL: "redis://tracearr-redis.tracearr.svc:6379"
  data:
    - secretKey: jwt
      remoteRef:
        key: SECRET_TRACEARR_JWT
    - secretKey: cookie
      remoteRef:
        key: SECRET_TRACEARR_COOKIE
    - secretKey: dbPassword
      remoteRef:
        key: SECRET_TRACEARR_POSTGRES_PASSWORD
