apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-optimize-retry-script
  namespace: plex
data:
  retry.py: |
    #!/usr/bin/env python3
    # Retries Plex optimize items stuck in error/disabled state.
    # Episodes: 'disabled' or 'error' (any context).
    # Movies: only 'error/sourceFileUnavailable' (file replaced by arr upgrade —
    #         reprocess re-binds to current Part). transcoderError /
    #         sourceFileMetadataError are deterministic codec/probe failures and
    #         loop forever; skip them. 'disabled/good' is completed-and-off.
    import os, re, sys, urllib.request, urllib.error, json

    PLEX_URL = os.environ.get("PLEX_URL", "http://plex:32400")
    JOB_ID = os.environ.get("OPTIMIZE_JOB_ID", "15792")
    PREFS = "/config/Library/Application Support/Plex Media Server/Preferences.xml"
    RETRY_STATES = {"disabled", "error"}

    def is_retry_target(it):
        # Movies: only retry 'error/sourceFileUnavailable' — file replaced by arr
        # upgrade, reprocess re-binds to current Part. transcoderError /
        # sourceFileMetadataError are deterministic and loop forever.
        # Episodes: retry both 'disabled' and 'error' (legacy behavior).
        st = it.get("processingState")
        if it.get("type") == "movie":
            return st == "error" and it.get("processingStateContext") == "sourceFileUnavailable"
        return st in RETRY_STATES

    with open(PREFS) as f:
        m = re.search(r'PlexOnlineToken="([^"]+)"', f.read())
    if not m:
        print("no PlexOnlineToken in Preferences.xml", file=sys.stderr); sys.exit(1)
    token = m.group(1)

    url = f"{PLEX_URL}/playlists/1066/items/{JOB_ID}/items?X-Plex-Token={token}"
    req = urllib.request.Request(url, headers={"Accept": "application/json"})
    data = json.load(urllib.request.urlopen(req, timeout=30))["MediaContainer"]
    items = data.get("Metadata", [])
    targets = [it for it in items if is_retry_target(it)]
    skipped_movies_disabled = sum(
        1 for it in items
        if it.get("type") == "movie" and it.get("processingState") == "disabled"
    )
    print(f"total={len(items)} retry_candidates={len(targets)} skipped_movies_disabled={skipped_movies_disabled}")

    def fingerprint(it):
        # Pull source media details: codec/container/resolution/bitrate.
        # Plex API: 'error'/'disabled' items expose no reason field, so we log
        # the source media shape to help spot patterns (e.g. AV1 always failing).
        media = (it.get("Media") or [{}])[0]
        parts = (media.get("Part") or [{}])[0]
        return (
            f"container={media.get('container','?')} "
            f"vcodec={media.get('videoCodec','?')} "
            f"acodec={media.get('audioCodec','?')} "
            f"res={media.get('width','?')}x{media.get('height','?')} "
            f"bitrate={media.get('bitrate','?')} "
            f"file={parts.get('file','?')}"
        )

    ok = fail = 0
    for it in targets:
        rk = it["ratingKey"]; title = it.get("title", "?")
        state = it.get("processingState")
        ctx = it.get("processingStateContext") or "-"
        show = it.get("grandparentTitle", "")
        season_ep = ""
        if it.get("parentIndex") is not None and it.get("index") is not None:
            season_ep = f" S{it['parentIndex']:02d}E{it['index']:02d}"
        label = f"{show}{season_ep} - {title}".strip(" -")
        print(f"ITEM  {state:8s} {ctx:24s} {rk} {label} | {fingerprint(it)}")
        u = f"{PLEX_URL}/playlists/1066/items/{JOB_ID}/{rk}/reprocess?X-Plex-Token={token}"
        r = urllib.request.Request(u, method="PUT")
        try:
            urllib.request.urlopen(r, timeout=15)
            print(f"RETRY {state:8s} {ctx:24s} {rk} {label}")
            ok += 1
        except urllib.error.HTTPError as e:
            print(f"FAIL  {state:8s} {ctx:24s} {rk} {label} http={e.code}")
            fail += 1
    print(f"done ok={ok} fail={fail}")
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: plex-optimize-retry
  namespace: plex
spec:
  schedule: "0 * * * *"
  # Suspended 2026-05-15: Plex Optimize is being wound down now that
  # scaleplex handles live transcoding. The Tautulli-driven optimize
  # notifier is disabled; this retry cron has nothing left to retry.
  # Kept (suspended, not deleted) for easy revert during the scaleplex
  # soak — remove the manifest once Optimize is fully retired.
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: plex
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          containers:
            - name: retry
              image: python:3.14-slim
              env:
                - name: PLEX_URL
                  value: http://plex:32400
                - name: OPTIMIZE_JOB_ID
                  value: "15792"
              command: ["python3", "/scripts/retry.py"]
              volumeMounts:
                - name: config-pms
                  mountPath: /config
                  readOnly: true
                - name: script
                  mountPath: /scripts
          volumes:
            - name: config-pms
              persistentVolumeClaim:
                claimName: plex-config-pms-vsan
            - name: script
              configMap:
                name: plex-optimize-retry-script
