---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: plex
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      plex:
        replicas: 1
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: "intel.feature.node.kubernetes.io/gpu"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          securityContext:
            supplementalGroups: [568]
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              tag: "1.43.1.10611-1e34174b1-ls303"
            env:
              TZ: Europe/Brussels
              VERSION: docker
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              # scaleplex DOCKER_MOD — lays down scaleplex-shim as
              # /usr/lib/plexmediaserver/Plex Transcoder and runs
              # scaleplex-relay as an s6-rc.d longrun. Transcoding is
              # delegated to the in-namespace orchestrator + worker
              # fleet; the PMS no longer transcodes locally.
              DOCKER_MODS: ghcr.io/varashi/scaleplex_pms_dockermod:sha-f28bf17
              # scaleplex-relay listens here; the shim's collectEnv()
              # also reads LOCAL_RELAY_PORT + PMS_SERVICE to derive the
              # per-session SCALEPLEX_PMS_BASE_URL for worker callbacks.
              LOCAL_RELAY_ENABLED: "1"
              LOCAL_RELAY_PORT: "32499"
              PMS_SERVICE: plex.plex.svc
              PMS_PORT: "32400"
              SCALEPLEX_ORCHESTRATOR_URL: http://plex-orchestrator.plex.svc:3500
              TRANSCODE_OPERATING_MODE: remote
              # Dump full PMS argv to the PMS log for durable
              # argv-corpus capture (replaces the old argv-tee wrapper).
              SCALEPLEX_DUMP_ARGV: "1"
            resources:
              requests:
                memory: 4Gi
              limits:
                gpu.intel.com/i915: 1

      # scaleplex orchestrator — slim Go HTTP server: DNS-discovers
      # workers via the headless plex-worker Service, forwards the
      # PMS-side shim's task POSTs, picks the least-loaded worker.
      orchestrator:
        containers:
          app:
            image:
              repository: ghcr.io/varashi/scaleplex_orchestrator
              tag: sha-5daef39
            env:
              TZ: Europe/Brussels
              LISTEN_ADDR: ":3500"
              WORKERS_DNS: plex-worker.plex.svc.cluster.local
              WORKER_PORT: "3501"
              WORKERS_REFRESH_SECONDS: "5"
              WORKERS_PROBE_SECONDS: "5"
            probes:
              liveness: { enabled: true, custom: true, spec: { httpGet: { path: /healthz, port: 3500 }, periodSeconds: 10 } }
              readiness: { enabled: true, custom: true, spec: { httpGet: { path: /readyz, port: 3500 }, periodSeconds: 2, failureThreshold: 30 } }
            resources:
              requests: { cpu: 50m, memory: 64Mi }
              limits: { memory: 128Mi }
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          # No GPU on orchestrator; runs on any node.
          tolerations: []
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "3500"
            prometheus.io/path: /metrics

      worker:
        type: daemonset
        containers:
          app:
            # scaleplex worker. Stock jellyfin-ffmpeg7 + iHD baked into
            # the image. Pre-warms VAAPI on startup; readiness flips
            # only after pre-warm completes so kubelet doesn't kill
            # mid-warm and Service endpoints don't see traffic until
            # the worker is hot.
            image:
              repository: ghcr.io/varashi/scaleplex_worker
              tag: sha-6a30636
            env:
              TZ: Europe/Brussels
              # All knobs (HW_RENDER_DEVICE, HW_VAAPI_DRIVER,
              # HW_FONTS_DIR, WORKER_MAX_SESSIONS) default sensibly.
              # Encoder choice (h264_vaapi vs hevc_vaapi) is driven by
              # PMS argv — Plex picks libx264/libx265 per session, the
              # worker maps 1:1 to the VAAPI variant.
              WORKER_DUMP_ARGV: "1"
            probes:
              liveness: { enabled: true, custom: true, spec: { httpGet: { path: /healthz, port: 3501 }, periodSeconds: 10, failureThreshold: 3 } }
              readiness: { enabled: true, custom: true, spec: { httpGet: { path: /readyz, port: 3501 }, periodSeconds: 2, failureThreshold: 60 } }
              startup: { enabled: true, custom: true, spec: { httpGet: { path: /healthz, port: 3501 }, periodSeconds: 1, failureThreshold: 30 } }
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
            # CAP_PERFMON lets the worker open i915 PMU events via
            # perf_event_open(2) — the GPU-busy telemetry source on Arc
            # (no sysfs busy file). allowPrivilegeEscalation MUST be
            # true: the worker binary carries cap_perfmon=ep (file
            # capability) so a non-root uid 1000 process gets the cap
            # bits on exec; allowPrivilegeEscalation:false sets
            # no_new_privs which forbids that promotion.
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add: ["PERFMON"]
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          # uid 1000 / gid 100 (`users`) match the worker Dockerfile's
          # `useradd -u 1000 -g users`. supplementalGroups: 44=video,
          # 568=render — both needed for /dev/dri/renderD128 access.
          securityContext:
            runAsUser: 1000
            runAsGroup: 100
            supplementalGroups: [44, 568]
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "3501"
            prometheus.io/path: /metrics
          terminationGracePeriodSeconds: 30

    service:
      plex:
        controller: plex
        ports:
          http:
            port: 32400
          # scaleplex-relay listens here. Workers POST progress /
          # manifest / segment_list updates to plex:32499; relay
          # forwards to 127.0.0.1:32400 so PMS sees a loopback source.
          relay:
            port: 32499
      orchestrator:
        controller: orchestrator
        ports:
          http:
            port: 3500
      worker:
        # Headless — the orchestrator DNS-resolves this to per-pod IPs.
        # ClusterIP would mask the per-pod addresses behind one VIP and
        # break per-worker /capability polling.
        controller: worker
        clusterIP: None
        ports:
          http:
            port: 3501
      plex-lb:
        type: LoadBalancer
        controller: plex
        externalTrafficPolicy: Local
        annotations:
          io.cilium/lb-ipam-ips: "172.16.4.104"
          external-dns.alpha.kubernetes.io/hostname: "plex-web.${SECRET_DOMAIN},plex-svc.${SECRET_DOMAIN}"
        ports:
          http:
            port: 32400
      plex-public:
        # controller required: app-template can no longer auto-detect
        # it once the HR has multiple controllers (plex + orchestrator
        # + worker). ExternalName Services have no real backing pod;
        # plex is the nominal owner.
        controller: plex
        type: ExternalName
        externalName: skw.wan.${SECRET_DOMAIN}
        annotations:
          external-dns.alpha.kubernetes.io/hostname: plex.${SECRET_DOMAIN},plex-svc.${SECRET_DOMAIN}
          external-dns.alpha.kubernetes.io/public: "true"
        ports:
          http:
            port: 32400

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Plex
          gethomepage.dev/description: Media server
          gethomepage.dev/group: Media
          gethomepage.dev/weight: "10"
          gethomepage.dev/icon: plex.png
          gethomepage.dev/href: https://plex.${SECRET_DOMAIN}
          gethomepage.dev/widget.type: plex
          gethomepage.dev/widget.url: http://plex.plex.svc:32400
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_PLEX}}`}}"
        hostnames:
          - "plex.${SECRET_DOMAIN}"
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: plex
                port: http

    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: plex-config-pms-vsan
        advancedMounts:
          plex:
            app:
              - path: /config
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Cache
      transcode:
        # Shared between the PMS (serves segments) and the scaleplex
        # worker (writes segments) — same NFS export, so the worker
        # writes exactly where the PMS reads, no path drift possible.
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/plextranscode
        advancedMounts:
          plex:
            app:
              - path: /transcode
          worker:
            app:
              - path: /transcode
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool/media
        advancedMounts:
          plex:
            app:
              - path: /media
          worker:
            app:
              - path: /media
      backup:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/backup/plex
        advancedMounts:
          plex:
            app:
              - path: /backup
