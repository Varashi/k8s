---
# Tee-wrapper for /usr/lib/plexmediaserver/Plex Transcoder. Logs argv
# to /transcode/_argv-corpus/<sid>.argv (one file per session, header
# line + NUL-separated args), then exec's the real binary.
#
# Mounted at /custom-cont-init.d/99-argv-tee on the plex pod via the
# linuxserver/plex container-init mechanism. Runs at container start;
# rename + wrapper-drop is idempotent so subsequent restarts don't
# re-rename an already-renamed binary.
#
# Logging is best-effort: every step that touches NFS or the wrapper
# install has `|| true` so any failure (NFS unreachable, perms,
# etc.) falls through to running the real Plex Transcoder unchanged.
# /usr/lib/plexmediaserver/ is on the image layer (ephemeral), so a
# pod restart after removing this configmap returns Plex to vanilla.
#
# IMPORTANT: every shell `${VAR}` and `$$` is doubled to `$${VAR}` /
# `$$$$` so Flux's `postBuild.substituteFrom` (cluster-vars +
# apps-substvars) doesn't blank out our shell variables. Flux/Kustomize
# converts `$$` back to `$` after envsubst runs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-argv-tee
  namespace: plex
data:
  99-argv-tee: |
    #!/usr/bin/with-contenv bash
    set +e
    PT="/usr/lib/plexmediaserver/Plex Transcoder"
    PT_REAL="$${PT}.real"
    LOG_DIR="$${PMS_ARGV_LOG_DIR:-/transcode/_argv-corpus}"

    # Idempotent: only rename + drop the wrapper if not already wrapped.
    # We detect "already wrapped" by checking for the .real backup.
    if [ ! -f "$${PT_REAL}" ] && [ -f "$${PT}" ]; then
      cp -p "$${PT}" "$${PT_REAL}" || exit 0
      cat >"$${PT}" <<'WRAPPER'
    #!/bin/bash
    # Best-effort argv tee. Any logging failure falls through to exec.
    LOG_DIR="$${PMS_ARGV_LOG_DIR:-/transcode/_argv-corpus}"
    # SID = <session_uuid>-<job_uuid>. PMS reuses session UUID across
    # initial-play / quality-change / sub-toggle / seek under one Plex
    # session — each gets a different job UUID. Capturing both means
    # we get one file per transcoder invocation, not one per session.
    SID=""
    for a in "$$@"; do
      case "$$a" in
        *transcode/session/*)
          rest="$${a##*transcode/session/}"
          SESSION="$${rest%%/*}"
          rest="$${rest#*/}"
          JOB="$${rest%%/*}"
          SID="$${SESSION}-$${JOB}"
          break
          ;;
      esac
    done
    [ -z "$${SID}" ] && SID="anon-$$(date +%s 2>/dev/null)-$$$$"

    out=""
    {
      mkdir -p "$${LOG_DIR}"
      out="$${LOG_DIR}/$${SID}.argv"
      # Skip if already captured this session.
      if [ ! -e "$${out}" ]; then
        tmp="$$(mktemp -p "$${LOG_DIR}" .argv.XXXXXX 2>/dev/null)"
        if [ -n "$${tmp}" ]; then
          {
            date -u '+%Y-%m-%dT%H:%M:%SZ'
            # Client identification — Plex Transcoder inherits the
            # X_PLEX_* vars from PMS; logging them here lets corpus
            # analysis cluster bugs by client class (PS4 vs LG WebOS
            # vs Android vs Apple TV vs Plex Web). CLIENT: prefix so
            # argv-extract can split the header lines off.
            for v in PRODUCT DEVICE_NAME PLATFORM VERSION USERNAME; do
              eval "val=\$${X_PLEX_$${v}}"
              [ -n "$${val}" ] && printf 'CLIENT:%s=%s\n' "$${v}" "$${val}"
            done
            printf '%s\0' "$$@"
          } >"$${tmp}"
          mv "$${tmp}" "$${out}"
        fi
      fi
    } 2>/dev/null || true

    # Run-then-stamp instead of exec so we can record the outcome.
    # Microsecond fork overhead is negligible vs Plex Transcoder's
    # multi-second segment work. Stamps {exit_status, duration_ms,
    # segments_created, ended_at} as an OUTCOME: footer the sweep
    # picks up alongside the argv body. Stderr capture is skipped
    # here — would require a tee redirect that PMS sees and could
    # mask transcoder issues for the live session.
    SPAWN_AT="$$(date +%s%3N 2>/dev/null || echo 0)"
    "/usr/lib/plexmediaserver/Plex Transcoder.real" "$$@"
    rc=$$?
    {
      [ -n "$${out}" ] && [ -e "$${out}" ] || exit 0
      end_at="$$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null)"
      end_ms="$$(date +%s%3N 2>/dev/null || echo 0)"
      dur=0
      [ "$${SPAWN_AT}" != 0 ] && [ "$${end_ms}" != 0 ] && dur=$$((end_ms - SPAWN_AT))
      segs=0
      cwd_dir="$${LOG_DIR%/_argv-corpus}/Transcode/Sessions/plex-transcode-$${SID}"
      if [ -d "$${cwd_dir}" ]; then
        segs=$$(find "$${cwd_dir}" -maxdepth 1 \( -name '*.ts' -o -name '*.m4s' \) 2>/dev/null | wc -l)
      fi
      printf 'OUTCOME:exit_status=%s duration_ms=%s segments_created=%s ended_at=%s\n' \
        "$${rc}" "$${dur}" "$${segs}" "$${end_at}" >>"$${out}"
    } 2>/dev/null || true
    exit $$rc
    WRAPPER
      chmod +x "$${PT}" || exit 0
    fi

    # Pre-create corpus dir so the wrapper's first call doesn't have
    # to mkdir under load. Best-effort; wrapper does its own mkdir too.
    mkdir -p "$${LOG_DIR}" 2>/dev/null || true

    exit 0
