---
# Daily Plex /config snapshot via rsync + --link-dest (rsnapshot pattern).
# Each daily directory under /backup/full/<YYYY-MM-DD>/ is a complete,
# browseable copy of /config; unchanged files are hardlinked to the previous
# day's inode, so 14 daily snapshots cost roughly base + sum(deltas) on disk.
# Excludes regenerable caches/logs and live SQLite DB files (those are
# captured separately by Butler -> /backup/db).
#
# Restore: stop plex, rsync -a /backup/full/<DATE>/ /config/, drop matching
# dated DB dumps from /backup/db into Plug-in Support/Databases/ renamed to
# com.plexapp.plugins.library.db / .blobs.db, start plex.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: plex-backup-full
  namespace: plex
spec:
  schedule: "30 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
          tolerations:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: plex
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: rsync
              image: instrumentisto/rsync-ssh:1.2.0
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  DATE=$$(date +%Y-%m-%d)
                  DEST=/backup/full/$$DATE
                  mkdir -p "$$DEST"

                  # Pick most-recent existing snapshot dir (lex-sorted == date-sorted)
                  LATEST=$$(ls -1d /backup/full/20[0-9][0-9]-[01][0-9]-[0-9][0-9] 2>/dev/null \
                            | grep -v "/$$DATE\$$" | sort | tail -n1 || true)
                  LINK_OPT=""
                  if [ -n "$$LATEST" ]; then
                    LINK_OPT="--link-dest=$$LATEST"
                    echo "linking against: $$LATEST"
                  else
                    echo "no prior snapshot; full copy"
                  fi

                  PMS="Library/Application Support/Plex Media Server"
                  rsync -a --delete --stats $$LINK_OPT \
                    --exclude="$$PMS/Cache/" \
                    --exclude="$$PMS/Crash Reports/" \
                    --exclude="$$PMS/Diagnostics/" \
                    --exclude="$$PMS/Logs/" \
                    --exclude="$$PMS/Plug-in Support/Caches/" \
                    --exclude="$$PMS/Plug-in Support/Databases/com.plexapp.plugins.library.db" \
                    --exclude="$$PMS/Plug-in Support/Databases/com.plexapp.plugins.library.db-shm" \
                    --exclude="$$PMS/Plug-in Support/Databases/com.plexapp.plugins.library.db-wal" \
                    --exclude="$$PMS/Plug-in Support/Databases/com.plexapp.plugins.library.blobs.db" \
                    --exclude="$$PMS/Plug-in Support/Databases/com.plexapp.plugins.library.blobs.db-shm" \
                    --exclude="$$PMS/Plug-in Support/Databases/com.plexapp.plugins.library.blobs.db-wal" \
                    /config/ "$$DEST/"

                  # Retention: delete dated dirs older than 14 days
                  find /backup/full -maxdepth 1 -type d \
                    -name '20[0-9][0-9]-[01][0-9]-[0-9][0-9]' \
                    -mtime +14 -print -exec rm -rf {} +
              volumeMounts:
                - name: config-pms
                  mountPath: /config
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: config-pms
              persistentVolumeClaim:
                claimName: plex-config-pms-vsan
                readOnly: true
            - name: backup
              nfs:
                server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
                path: /mnt/DATA/backup/plex
