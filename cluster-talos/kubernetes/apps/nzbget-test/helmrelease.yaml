---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget-test
  namespace: nzbget-test
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups: [568]
        seccompProfile:
          type: RuntimeDefault
    controllers:
      nzbget-test:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.1
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
            resources:
              requests:
                cpu: 1000m
                memory: 1Gi
              limits:
                cpu: 6000m
                memory: 8Gi
    service:
      app:
        controller: nzbget-test
        ports:
          http:
            port: 6789
    route:
      app:
        hostnames:
          - nzbget-test.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            timeouts:
              request: 3600s
              backendRequest: 3600s
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: nzbget-test-config
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool
        globalMounts:
          - path: /mnt/skw-truenas-data
      download:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/SSD/mediapool/downloads_nzbget_test
        globalMounts:
          - path: /downloads
