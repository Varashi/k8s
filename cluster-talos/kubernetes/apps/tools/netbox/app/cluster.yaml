apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: netbox-pg
  namespace: netbox
spec:
  instances: 2
  storage:
    size: 20Gi
    storageClass: vsan
  bootstrap:
    initdb:
      database: netbox
      owner: netbox
      secret:
        name: netbox-db-app
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: intel.feature.node.kubernetes.io/gpu
                operator: DoesNotExist
