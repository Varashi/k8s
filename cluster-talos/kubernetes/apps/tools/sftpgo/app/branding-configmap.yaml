---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sftpgo-branding-assets
  namespace: sftpgo
binaryData:
  boeye-banner.svg: 
  boeye-logo-mark.svg: 
data:
  custom.css: |
    /* Homepage-inspired dark theme for sftpgo web client. */
    html, body {
      min-height: 100vh;
      background-image: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2400&q=80") !important;
      background-size: cover !important;
      background-attachment: fixed !important;
      background-position: center !important;
      color: #e2e8f0 !important;
    }
    body, body.app-blank, #app_root, #app_loader, .bg-body, .bgi-size-contain {
      background-color: transparent !important;
    }

    .card, .bg-body, .bg-light {
      background-color: rgba(15, 23, 42, 0.72) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.15) !important;
      color: #e2e8f0 !important;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.45) !important;
    }
    .card-header, .card-body, .card-footer {
      background-color: transparent !important;
      border-color: rgba(148, 163, 184, 0.12) !important;
      color: #e2e8f0 !important;
    }

    .text-gray-900, .text-gray-800, .text-dark, .text-body,
    h1, h2, h3, h4, h5, h6, .menu-title {
      color: #e2e8f0 !important;
    }
    .text-gray-700, .text-gray-600, .text-gray-500, .text-muted {
      color: #94a3b8 !important;
    }

    h1.text-gray-900, .card-title h2, .card-title .fw-bold {
      background: linear-gradient(90deg, #67e8f9, #a78bfa, #67e8f9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent !important;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .btn.btn-primary, .btn-primary {
      background-color: #67e8f9 !important;
      border-color: #67e8f9 !important;
      color: #0f172a !important;
    }
    .btn.btn-primary:hover, .btn-primary:hover,
    .btn.btn-primary:focus, .btn-primary:focus {
      background-color: #22d3ee !important;
      border-color: #22d3ee !important;
      color: #0f172a !important;
    }
    .btn.btn-light-primary {
      background-color: rgba(103, 232, 249, 0.12) !important;
      color: #67e8f9 !important;
      border-color: transparent !important;
    }
    .btn.btn-light-primary:hover, .btn.btn-light-primary:focus {
      background-color: rgba(103, 232, 249, 0.25) !important;
      color: #67e8f9 !important;
    }
    .btn.btn-active-light-primary:hover, .btn.btn-active-light-primary:focus {
      background-color: rgba(103, 232, 249, 0.18) !important;
      color: #67e8f9 !important;
    }

    .form-control, .form-control-solid, .form-select {
      background-color: rgba(15, 23, 42, 0.5) !important;
      color: #f1f5f9 !important;
      border-color: rgba(148, 163, 184, 0.3) !important;
    }
    .form-control:focus, .form-control-solid:focus, .form-select:focus {
      border-color: #67e8f9 !important;
      box-shadow: 0 0 0 2px rgba(103, 232, 249, 0.3) !important;
      background-color: rgba(15, 23, 42, 0.6) !important;
      color: #f1f5f9 !important;
    }
    .form-control::placeholder { color: #94a3b8 !important; }

    a, a:hover { color: #67e8f9 !important; }
    .text-primary { color: #67e8f9 !important; }

    .badge.badge-light-primary {
      background-color: rgba(103, 232, 249, 0.15) !important;
      color: #67e8f9 !important;
    }

    .table, .table th, .table td {
      color: #e2e8f0 !important;
      border-color: rgba(148, 163, 184, 0.15) !important;
    }
    .table tbody tr:hover {
      background-color: rgba(103, 232, 249, 0.08) !important;
    }

    .separator { border-color: rgba(148, 163, 184, 0.2) !important; }

    /* Dropdown menus */
    .menu-sub-dropdown, .dropdown-menu {
      background-color: rgba(15, 23, 42, 0.95) !important;
      border: 1px solid rgba(148, 163, 184, 0.2) !important;
      color: #e2e8f0 !important;
      backdrop-filter: blur(10px);
    }
    .menu-link { color: #e2e8f0 !important; }
    .menu-link:hover { background-color: rgba(103, 232, 249, 0.1) !important; color: #67e8f9 !important; }

    /* Login card banner logo sizing */
    #app_root img[alt="Logo"] {
      max-height: 96px !important;
      width: auto !important;
      object-fit: contain;
    }
