---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/apps/tools/homepage/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
