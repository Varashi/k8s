---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      homepage:
        replicas: 1
        strategy: Recreate
        serviceAccount:
          identifier: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.12.3
            env:
              HOMEPAGE_ALLOWED_HOSTS: home.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: homepage-widgets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: home.${SECRET_DOMAIN}
                  initialDelaySeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: home.${SECRET_DOMAIN}
                  initialDelaySeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: home.${SECRET_DOMAIN}
                  periodSeconds: 2
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

    service:
      app:
        controller: homepage
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames:
          - home.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http

    configMaps:
      config:
        data:
          settings.yaml: |
            title: Boeye homelab
            theme: dark
            color: slate
            headerStyle: clean
            layout:
              Media:
                style: column
                columns: 1
              Arr:
                style: column
                columns: 1
              Downloaders:
                style: column
                columns: 1
              Tools:
                style: column
                columns: 1
              Network-SKW:
                style: row
                columns: 7
                icon: mdi-lan
              Network-STA:
                style: row
                columns: 3
                icon: mdi-vpn
            kubernetes:
              mode: cluster
              gateway: true
          services.yaml: |
            - Network-SKW:
                - OPNsense:
                    icon: opnsense.png
                    href: https://skw-edgerouter.${SECRET_DOMAIN}
                    description: SKW firewall
                    weight: 10
                    widget:
                      type: opnsense
                      url: https://skw-edgerouter.${SECRET_DOMAIN}
                      username: "{{`{{HOMEPAGE_VAR_OPNSENSE_KEY}}`}}"
                      password: "{{`{{HOMEPAGE_VAR_OPNSENSE_SECRET}}`}}"
                - skw-switch10g1:
                    icon: mikrotik.png
                    href: http://skw-switch10g1.${SECRET_DOMAIN}
                    description: 10G core (RSTP root)
                    weight: 20
                    widget:
                      type: mikrotik
                      url: http://skw-switch10g1.${SECRET_DOMAIN}
                      username: admin
                      password: "{{`{{HOMEPAGE_VAR_MIKROTIK}}`}}"
                - skw-switch10g2:
                    icon: mikrotik.png
                    href: http://skw-switch10g2.${SECRET_DOMAIN}
                    description: 10G core (secondary)
                    weight: 30
                    widget:
                      type: mikrotik
                      url: http://skw-switch10g2.${SECRET_DOMAIN}
                      username: admin
                      password: "{{`{{HOMEPAGE_VAR_MIKROTIK}}`}}"
                - skw-switch1g1:
                    icon: mikrotik.png
                    href: http://skw-switch1g1.${SECRET_DOMAIN}
                    description: 1G PoE (ground floor)
                    weight: 40
                    widget:
                      type: mikrotik
                      url: http://skw-switch1g1.${SECRET_DOMAIN}
                      username: admin
                      password: "{{`{{HOMEPAGE_VAR_MIKROTIK}}`}}"
                - skw-switch1g2:
                    icon: mikrotik.png
                    href: http://skw-switch1g2.${SECRET_DOMAIN}
                    description: 1G PoE (first floor)
                    weight: 50
                    widget:
                      type: mikrotik
                      url: http://skw-switch1g2.${SECRET_DOMAIN}
                      username: admin
                      password: "{{`{{HOMEPAGE_VAR_MIKROTIK}}`}}"
                - WAN IP SKW:
                    icon: mdi-ip-outline-#38bdf8
                    description: Public IP @ SKW
                    weight: 60
                    widget:
                      type: customapi
                      url: https://dns.google/resolve?name=skw.wan.${SECRET_DOMAIN}&type=A
                      refreshInterval: 60000
                      mappings:
                        - field: Answer.0.data
                          label: IP
                - Tailscale:
                    icon: tailscale.png
                    href: https://login.tailscale.com/admin/machines
                    description: OPNsense tailnet node
                    weight: 70
                    widget:
                      type: tailscale
                      deviceid: nuAHmUbg2n11CNTRL
                      key: "{{`{{HOMEPAGE_VAR_TS_KEY}}`}}"
            - Network-STA:
                - STA pfSense:
                    icon: pfsense.png
                    href: https://sta-router.${SECRET_DOMAIN}
                    description: STA firewall (SG-3100, no API)
                    weight: 10
                - WAN IP STA:
                    icon: mdi-ip-outline-#38bdf8
                    description: Public IP @ STA
                    weight: 20
                    widget:
                      type: customapi
                      url: https://dns.google/resolve?name=sta.wan.${SECRET_DOMAIN}&type=A
                      refreshInterval: 60000
                      mappings:
                        - field: Answer.0.data
                          label: IP
                - WG SKW-STA:
                    icon: wireguard.png
                    href: https://skw-edgerouter.${SECRET_DOMAIN}/ui/wireguard/general
                    description: Site-to-site tunnel
                    weight: 30
                    widget:
                      type: customapi
                      url: https://skw-edgerouter.${SECRET_DOMAIN}/api/wireguard/service/show
                      username: "{{`{{HOMEPAGE_VAR_OPNSENSE_KEY}}`}}"
                      password: "{{`{{HOMEPAGE_VAR_OPNSENSE_SECRET}}`}}"
                      refreshInterval: 30000
                      mappings:
                        - field: rows.1.peer-status
                          label: State
                        - field: rows.1.latest-handshake-age
                          label: Last HS
                          format: duration
                        - field: rows.1.transfer-rx
                          label: RX
                          format: bytes
                        - field: rows.1.transfer-tx
                          label: TX
                          format: bytes
            - Downloaders:
                - NZBGet:
                    icon: nzbget.png
                    href: https://nzbget.${SECRET_DOMAIN}
                    description: Usenet downloader (TrueNAS)
                    weight: 10
                    widget:
                      type: nzbget
                      url: http://nzbget.nzbget.svc:6789
                      username: varashi
                      password: "{{`{{HOMEPAGE_VAR_NZBGET}}`}}"
          bookmarks.yaml: |
            - Infra:
                - vCenter:
                    - abbr: VC
                      href: https://skw-vcsa.${SECRET_DOMAIN}
                - OPNsense:
                    - abbr: FW
                      href: https://skw-edgerouter.${SECRET_DOMAIN}
                - TrueNAS:
                    - abbr: NAS
                      href: https://skw-truenas-data.${SECRET_DOMAIN}
                - Home Assistant:
                    - abbr: HA
                      href: https://ha.${SECRET_DOMAIN}
          widgets.yaml: |
            - resources:
                backend: kubernetes
                expanded: true
                cpu: true
                memory: true
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: k8s-talos
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
            - search:
                provider: google
                target: _blank
            - datetime:
                text_size: xl
                format:
                  timeStyle: short
                  dateStyle: short
          docker.yaml: |
            {}
          kubernetes.yaml: |
            mode: cluster
            gateway: true
          custom.css: ""
          custom.js: ""

    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /app/config
      settings:
        type: configMap
        name: homepage
        globalMounts:
          - path: /app/config/settings.yaml
            subPath: settings.yaml
            readOnly: true
          - path: /app/config/services.yaml
            subPath: services.yaml
            readOnly: true
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
            readOnly: true
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
            readOnly: true
          - path: /app/config/docker.yaml
            subPath: docker.yaml
            readOnly: true
          - path: /app/config/kubernetes.yaml
            subPath: kubernetes.yaml
            readOnly: true
          - path: /app/config/custom.css
            subPath: custom.css
            readOnly: true
          - path: /app/config/custom.js
            subPath: custom.js
            readOnly: true
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs

    serviceAccount:
      homepage: {}

    rbac:
      roles:
        homepage:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                - namespaces
                - nodes
                - pods
                - services
                - endpoints
              verbs: [get, list, watch]
            - apiGroups: ["extensions", "networking.k8s.io"]
              resources: [ingresses]
              verbs: [get, list, watch]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: [gateways, httproutes]
              verbs: [get, list, watch]
            - apiGroups: ["metrics.k8s.io"]
              resources: [nodes, pods]
              verbs: [get, list]
            - apiGroups: ["apps"]
              resources: [deployments, statefulsets, daemonsets, replicasets]
              verbs: [get, list, watch]
            - apiGroups: ["batch"]
              resources: [cronjobs, jobs]
              verbs: [get, list, watch]
            - apiGroups: ["traefik.containo.us", "traefik.io"]
              resources: [ingressroutes]
              verbs: [get, list, watch]
      bindings:
        homepage:
          type: ClusterRoleBinding
          roleRef:
            identifier: homepage
          subjects:
            - identifier: homepage

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
