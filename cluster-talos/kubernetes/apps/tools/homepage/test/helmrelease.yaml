---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage-test
  namespace: homepage
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      homepage-test:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: homepage-test
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.12.3
            env:
              HOMEPAGE_ALLOWED_HOSTS: status-test.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: homepage-widgets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: status-test.${SECRET_DOMAIN}
                  initialDelaySeconds: 15
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: status-test.${SECRET_DOMAIN}
                  initialDelaySeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: status-test.${SECRET_DOMAIN}
                  periodSeconds: 2
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
          data-proxy:
            image:
              repository: python
              tag: "3.14-slim"
            command:
              - sh
              - -c
              - "pip install --quiet --no-cache-dir --target /tmp/pylibs pyvmomi paramiko && PYTHONPATH=/tmp/pylibs python3 /app/proxy.py"
            env:
              ESXI_USER: root
            envFrom:
              - secretRef:
                  name: homepage-widgets
              - secretRef:
                  name: homepage-extras
                  optional: true
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 384Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    service:
      app:
        controller: homepage-test
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames:
          - status-test.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http

    persistence:
      config:
        type: emptyDir
        advancedMounts:
          homepage-test:
            app:
              - path: /app/config
      logs:
        type: emptyDir
        advancedMounts:
          homepage-test:
            app:
              - path: /app/config/logs
      settings:
        type: configMap
        name: homepage-test-config
        advancedMounts:
          homepage-test:
            app:
              - path: /app/config/settings.yaml
                subPath: settings.yaml
                readOnly: true
              - path: /app/config/services.yaml
                subPath: services.yaml
                readOnly: true
              - path: /app/config/bookmarks.yaml
                subPath: bookmarks.yaml
                readOnly: true
              - path: /app/config/widgets.yaml
                subPath: widgets.yaml
                readOnly: true
              - path: /app/config/docker.yaml
                subPath: docker.yaml
                readOnly: true
              - path: /app/config/kubernetes.yaml
                subPath: kubernetes.yaml
                readOnly: true
              - path: /app/config/custom.css
                subPath: custom.css
                readOnly: true
              - path: /app/config/custom.js
                subPath: custom.js
                readOnly: true
      proxy-script:
        type: configMap
        name: homepage-test-proxy
        advancedMounts:
          homepage-test:
            data-proxy:
              - path: /app/proxy.py
                subPath: proxy.py
                readOnly: true

    serviceAccount:
      homepage-test: {}

    rbac:
      roles:
        homepage-test:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                - namespaces
                - nodes
                - pods
                - services
                - endpoints
              verbs: [get, list, watch]
            - apiGroups: ["extensions", "networking.k8s.io"]
              resources: [ingresses]
              verbs: [get, list, watch]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: [gateways, httproutes]
              verbs: [get, list, watch]
            - apiGroups: ["metrics.k8s.io"]
              resources: [nodes, pods]
              verbs: [get, list]
            - apiGroups: ["apps"]
              resources: [deployments, statefulsets, daemonsets, replicasets]
              verbs: [get, list, watch]
            - apiGroups: ["batch"]
              resources: [cronjobs, jobs]
              verbs: [get, list, watch]
            - apiGroups: ["traefik.containo.us", "traefik.io"]
              resources: [ingressroutes]
              verbs: [get, list, watch]
      bindings:
        homepage-test:
          type: ClusterRoleBinding
          roleRef:
            identifier: homepage-test
          subjects:
            - identifier: homepage-test

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
