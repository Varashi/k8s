---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-test
  labels:
    app.kubernetes.io/name: homepage-test
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage-test
    spec:
      serviceAccountName: homepage
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      containers:
        - name: data-proxy
          image: python:3.12-slim
          command:
            - sh
            - -c
            - "pip install --quiet --no-cache-dir --target /tmp/pylibs pyvmomi && PYTHONPATH=/tmp/pylibs python3 /app/proxy.py"
          envFrom:
            - secretRef:
                name: homepage-widgets
            - secretRef:
                name: homepage-test-extras
                optional: true
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: proxy-script
              mountPath: /app/proxy.py
              subPath: proxy.py
              readOnly: true
        - name: app
          image: ghcr.io/gethomepage/homepage:v1.12.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: testhome.boeye.net
          envFrom:
            - secretRef:
                name: homepage-widgets
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
              httpHeaders:
                - name: Host
                  value: testhome.boeye.net
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
              httpHeaders:
                - name: Host
                  value: testhome.boeye.net
            initialDelaySeconds: 15
          volumeMounts:
            - name: config-rw
              mountPath: /app/config
            - name: logs
              mountPath: /app/config/logs
            - name: settings
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
              readOnly: true
            - name: settings
              mountPath: /app/config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: settings
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
              readOnly: true
            - name: settings
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
              readOnly: true
            - name: settings
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
              readOnly: true
            - name: settings
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
              readOnly: true
            - name: settings
              mountPath: /app/config/custom.css
              subPath: custom.css
              readOnly: true
            - name: settings
              mountPath: /app/config/custom.js
              subPath: custom.js
              readOnly: true
      volumes:
        - name: config-rw
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: settings
          configMap:
            name: homepage-test
        - name: proxy-script
          configMap:
            name: homepage-test-proxy
