---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-test-extras
  namespace: homepage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: homepage-test-extras
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TRUENAS_TOKEN
      remoteRef:
        key: SECRET_TRUENAS_API_KEY
    - secretKey: VSPHERE_USER
      remoteRef:
        key: SECRET_VSPHERE_USERNAME
    - secretKey: VSPHERE_PASS
      remoteRef:
        key: SECRET_VSPHERE_PASSWORD
