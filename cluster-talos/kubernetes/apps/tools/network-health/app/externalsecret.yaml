---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: network-health
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: network-health
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Same INFRA_SSH_PASSWORD value, two upstream keys for clarity.
        ESXI_PASSWORD: "{{ .esxi }}"
        TRUENAS_PASSWORD: "{{ .esxi }}"
        MIKROTIK_PASSWORD: "{{ .mikrotik }}"
        OPNSENSE_API_KEY: "{{ .opnsenseKey }}"
        OPNSENSE_API_SECRET: "{{ .opnsenseSecret }}"
  data:
    - secretKey: esxi
      remoteRef:
        key: SECRET_ESXI_ROOT_PASSWORD
    - secretKey: mikrotik
      remoteRef:
        key: SECRET_MIKROTIK_PASSWORD
    - secretKey: opnsenseKey
      remoteRef:
        key: SECRET_OPNSENSE_API_KEY
    - secretKey: opnsenseSecret
      remoteRef:
        key: SECRET_OPNSENSE_API_SECRET
