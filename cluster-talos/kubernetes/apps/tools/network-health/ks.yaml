---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-health
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/apps/tools/network-health/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
