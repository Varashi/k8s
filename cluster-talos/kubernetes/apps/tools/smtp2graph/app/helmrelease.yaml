---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: smtp2graph
  namespace: smtp
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      smtp2graph:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/smtp2graph/smtp2graph
              tag: v1.1.4
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: false
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: smtp2graph
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "172.16.4.109"
          external-dns.alpha.kubernetes.io/hostname: smtptest.${SECRET_DOMAIN}
        ports:
          smtp:
            port: 25
            targetPort: 25

    persistence:
      config:
        type: secret
        name: smtp2graph-config
        advancedMounts:
          smtp2graph:
            app:
              - path: /data/config.yml
                subPath: config.yml
                readOnly: true

    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
