---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netbox-lb-sync
  namespace: netbox-lb-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netbox-lb-sync
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netbox-lb-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netbox-lb-sync
subjects:
  - kind: ServiceAccount
    name: netbox-lb-sync
    namespace: netbox-lb-sync
