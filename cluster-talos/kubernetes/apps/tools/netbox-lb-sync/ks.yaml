---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbox-lb-sync
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: netbox
  path: ./cluster-talos/kubernetes/apps/tools/netbox-lb-sync/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
