---
# OCIS admin password consumed by ocis init at first boot.
# Set in BW SM before first reconcile: SECRET_OCIS_ADMIN_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ocis-admin
  namespace: ocis
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: ocis-admin
    creationPolicy: Owner
  data:
    - secretKey: IDM_ADMIN_PASSWORD
      remoteRef:
        key: SECRET_OCIS_ADMIN_PASSWORD
