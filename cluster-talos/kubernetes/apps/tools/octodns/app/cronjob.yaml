---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: octodns-sync
  namespace: octodns
spec:
  schedule: "*/15 * * * *"
  timeZone: Europe/Brussels
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: octodns
              # renovate: datasource=docker depName=ghcr.io/varashi/octodns versioning=docker
              image: ghcr.io/varashi/octodns:latest@sha256:a40d61d74fd77b1e19b477716bcea9905003bfa89945a4f98f974f604a758d86
              imagePullPolicy: IfNotPresent
              args:
                - octodns-sync-filtered
                - --config-file
                - /etc/octodns/config.yaml
                - --doit
                # --force bypasses raise_if_unsafe guards (RootNsChange, bulk
                # deletes). Safe for a one-way AD→NetBox mirror where AD is
                # authoritative and NetBox is rebuilt each run.
                - --force
              envFrom:
                - secretRef:
                    name: octodns-netbox
              volumeMounts:
                - name: config
                  mountPath: /etc/octodns
                  readOnly: true
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { memory: 256Mi }
          volumes:
            - name: config
              configMap:
                name: octodns-config
