apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvc.yaml
  - externalsecret.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: recyclarr
    namespace: recyclarr
    files:
      - recyclarr.yml=./config/recyclarr.yml
generatorOptions:
  disableNameSuffixHash: true
