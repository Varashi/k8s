---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: recyclarr
spec:
  interval: 30m
  maxHistory: 3
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
    controllers:
      recyclarr:
        type: cronjob
        cronjob:
          schedule: "@daily"
          ttlSecondsAfterFinished: 172800
        containers:
          app:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.5.1
              pullPolicy: IfNotPresent
            env:
              COMPlus_EnableDiagnostics: "0"
              RADARR_API_KEY: c11c0b12d16e4dd3be4fce4a9e02bde9
              SONARR_API_KEY: 16c2c87c42c1442ba9b25e866b10b475
            envFrom:
              - secretRef:
                  name: recyclarr-secrets
            args: ["sync"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 37M
              limits:
                memory: 220M
    persistence:
      config-state:
        type: persistentVolumeClaim
        existingClaim: recyclarr-state
        globalMounts:
          - path: /config/state
            subPath: state
      config-file:
        type: configMap
        name: recyclarr
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
