---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: bazarr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        supplementalGroups: [568]
        seccompProfile:
          type: RuntimeDefault
    controllers:
      bazarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/bazarr
              tag: 1.5.6
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
            resources:
              requests:
                cpu: 100m
              limits:
                cpu: 1000m
    service:
      app:
        controller: bazarr
        ports:
          http:
            port: 6767
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |
            conditions: ["[STATUS] < 500"]
            interval: 60s
            group: arr
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Bazarr
          gethomepage.dev/description: Subtitles
          gethomepage.dev/group: Arr
          gethomepage.dev/weight: "70"
          gethomepage.dev/icon: bazarr.png
          gethomepage.dev/href: https://bazarr.${SECRET_DOMAIN}
          gethomepage.dev/widget.type: bazarr
          gethomepage.dev/widget.url: http://bazarr.bazarr.svc:6767
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_BAZARR}}`}}"
        hostnames:
          - bazarr.${SECRET_DOMAIN}
        parentRefs:
          - name: main
            namespace: cilium
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: bazarr-config
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/mediapool
        globalMounts:
          - path: /mnt/skw-truenas-data
      backup:
        type: nfs
        server: ${SECRET_NFS_HOST}.${SECRET_DOMAIN}
        path: /mnt/DATA/backup/bazarr
        globalMounts:
          - path: /config/backup
