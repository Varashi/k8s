---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: bazarr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: DoesNotExist
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 0
        runAsGroup: 0
    controllers:
      bazarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/bazarr
              tag: 1.5.6
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
    service:
      app:
        controller: bazarr
        ports:
          http:
            port: 6767
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: bazarr-config
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: skw-truenas-data.${SECRET_DOMAIN}
        path: /mnt/DATA
        globalMounts:
          - path: /mnt/skw-truenas-data
      backup:
        type: nfs
        server: skw-truenas-data.${SECRET_DOMAIN}
        path: /mnt/DATA/backup/bazarr
        globalMounts:
          - path: /config/backup
