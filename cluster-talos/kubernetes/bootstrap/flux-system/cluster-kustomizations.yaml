---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cloudflare-operator
  namespace: flux-system
spec:
  interval: 1h
  path: ./config/default
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: cloudflare-operator
  dependsOn:
    - name: infrastructure-controllers
  wait: true
  timeout: 5m
  patches:
    - target:
        kind: Deployment
        name: cloudflare-operator-controller-manager
      patch: |
        - op: add
          path: /spec/template/spec/tolerations
          value:
            - key: node.cloudprovider.kubernetes.io/uninitialized
              operator: Exists
              effect: NoSchedule
            - key: intel.feature.node.kubernetes.io/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cloudflare-tunnel
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/infrastructure/cloudflare-operator
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-cloudflare-operator
    - name: infrastructure-configs
  wait: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
      - kind: Secret
        name: cloudflare-substvars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-longhorn
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-controllers
    - name: infrastructure-configs
  path: ./cluster-talos/kubernetes/infrastructure/longhorn
  # prune=false: Longhorn holds stateful replica data — accidental prune
  # (path typo, kustomize build error) MUST NOT cascade-delete the CRs,
  # as that triggers orphan controller and wipes replicas on disk.
  # Removing a Longhorn manifest from git = remove it via kubectl manually.
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
  wait: true
  timeout: 15m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-tanzu-logging
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-controllers
    - name: infrastructure-configs
  path: ./cluster-talos/kubernetes/infrastructure/tanzu-logging
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
