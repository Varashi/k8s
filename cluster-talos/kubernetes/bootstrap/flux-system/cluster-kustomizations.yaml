# All cluster-level Flux Kustomizations — applied as part of the flux-system bootstrap
# so they are self-managed from the moment flux bootstrap completes.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-flux-system
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/infrastructure/flux-system
  # prune=false: FluxInstance manages the flux-system controllers in-place.
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-repositories
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/flux-repositories
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-core
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/infrastructure/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # wait=false: parent just applies child Kustomization CRs; children with
  # cross-tier deps (etcd-backup → configs in platform) would otherwise
  # deadlock via the cross-tier chain.
  wait: false
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-platform
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-core
  path: ./cluster-talos/kubernetes/infrastructure/platform
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # wait=false: parent just applies child Kustomization CRs; platform will
  # host children with cross-tier deps (configs → cert-manager). Match
  # infrastructure-core pattern.
  wait: false
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: configs
    - name: cloudflare-operator
  path: ./cluster-talos/kubernetes/apps
  prune: false  # temp during apps-tier refactor; pure aggregator after split
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
      - kind: Secret
        name: apps-substvars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forwarders
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: configs
    - name: cloudflare-operator
  path: ./cluster-talos/kubernetes/forwarders
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # wait=false: aggregator; children carry their own dependsOn/postBuild.
  wait: false
  timeout: 5m
