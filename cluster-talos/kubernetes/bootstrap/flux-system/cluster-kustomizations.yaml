# All cluster-level Flux Kustomizations — applied as part of the flux-system bootstrap
# so they are self-managed from the moment flux bootstrap completes.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-flux-system
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/infrastructure/flux-system
  # prune=false: FluxInstance manages the flux-system controllers in-place.
  # Also: repo layout refactor in progress — flip back to true on final structure.
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-repositories
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/flux-repositories
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-kube-system
  namespace: flux-system
spec:
  interval: 1h
  path: ./cluster-talos/kubernetes/infrastructure/kube-system
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  # wait=false: parent just applies child Kustomization CRs; children with
  # cross-tier deps (etcd-backup → infrastructure-configs) would otherwise
  # deadlock the controllers→configs chain that runs after this parent.
  wait: false
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-kube-system
  path: ./cluster-talos/kubernetes/infrastructure/controllers
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-certs
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-controllers
  path: ./cluster-talos/kubernetes/infrastructure/certs
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-controllers
    - name: infrastructure-certs
  path: ./cluster-talos/kubernetes/infrastructure/configs
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-external-dns
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-configs
  path: ./cluster-talos/kubernetes/infrastructure/external-dns
  prune: false  # temp during repo layout refactor; flip back to true on final structure
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
      - kind: Secret
        name: externaldns-substvars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
