metadata:
  name: infrastructure-external-dns-cloudflare
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure-configs
  path: ./cluster-talos/kubernetes/infrastructure/external-dns-cloudflare
