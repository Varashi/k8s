apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nzbget
  namespace: nzbget
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: NZBGet
    gethomepage.dev/description: Usenet downloader (TrueNAS)
    gethomepage.dev/group: Downloaders
    gethomepage.dev/icon: nzbget.png
    gethomepage.dev/href: https://nzbget.${SECRET_DOMAIN}
    gethomepage.dev/widget.type: nzbget
    gethomepage.dev/widget.url: http://nzbget.nzbget.svc:6789
    gethomepage.dev/widget.username: varashi
    gethomepage.dev/widget.password: "{{HOMEPAGE_VAR_NZBGET}}"
spec:
  parentRefs:
    - name: main
      namespace: cilium
      sectionName: https
  hostnames:
    - nzbget.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 3600s
        backendRequest: 3600s
      backendRefs:
        - name: nzbget
          port: 6789
